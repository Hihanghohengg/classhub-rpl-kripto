<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulator Operasi Sandi & Pernika - Level Akhir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ================= ANTI CHEAT & UI CORE ================= */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617; 
            color: #f8fafc;
            overflow-x: hidden;
            touch-action: manipulation;
            /* NON-SELECTABLE TEXT */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        .morse-font { font-family: 'Share Tech Mono', monospace; }
        .neon-text { text-shadow: 0 0 10px rgba(56, 189, 248, 0.7), 0 0 20px rgba(56, 189, 248, 0.5); }
        .neon-text-green { text-shadow: 0 0 10px rgba(74, 222, 128, 0.7), 0 0 20px rgba(74, 222, 128, 0.5); }
        .neon-text-red { text-shadow: 0 0 10px rgba(248, 113, 113, 0.7), 0 0 20px rgba(248, 113, 113, 0.5); }
        
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(14, 165, 233, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -2;
        }
        
        .radar-sweep {
            position: fixed;
            top: 50%; left: 50%; width: 150vw; height: 150vw;
            margin-top: -75vw; margin-left: -75vw;
            background: conic-gradient(from 0deg, transparent 70%, rgba(16, 185, 129, 0.1) 100%);
            border-radius: 50%;
            animation: sweep 4s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes sweep { 100% { transform: rotate(360deg); } }

        .btn-game { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-game:active:not(:disabled) { transform: scale(0.95); }
        .btn-game:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .timer-bar { transition: width 0.1s linear, background-color 0.3s; }
    </style>
</head>
<body class="flex flex-col h-screen" oncontextmenu="return false;" oncopy="return false;" oncut="return false;" onpaste="return false;">
    <div class="grid-bg"></div>
    <div class="radar-sweep"></div>

    <header class="p-4 border-b border-slate-800 bg-slate-950/80 backdrop-blur-md flex justify-between items-center z-10 sticky top-0 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-sky-900/50 flex items-center justify-center border border-sky-500/30">
                <i class="fa-solid fa-satellite-dish text-sky-400"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-sky-400 neon-text uppercase tracking-widest leading-none">Pusat Latihan Komando</h1>
                <p class="text-[10px] text-slate-400 font-mono mt-1">KAPITA SELEKTA PERNIKA V4.0 (SECURE)</p>
            </div>
        </div>
        <div id="stats-header" class="hidden flex space-x-3 text-sm font-mono">
            <div class="bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-700 flex items-center shadow-inner">
                <i class="fa-solid fa-heart text-red-500 mr-2 animate-pulse"></i> <span id="lives-display" class="font-bold text-white">3</span>
            </div>
            <div class="bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-700 flex items-center shadow-inner">
                <i class="fa-solid fa-bolt text-yellow-400 mr-2"></i> <span id="score-display" class="font-bold text-white">0</span>
            </div>
        </div>
    </header>

    <main id="app-container" class="flex-1 flex flex-col items-center justify-center p-4 relative z-10 w-full max-w-4xl mx-auto overflow-y-auto">
        <!-- Konten Dinamis -->
    </main>

    <script>
        /* ================= DATABASE STUDI KASUS MEGA ================= */
        // Format: [Skenario Kasus, Jawaban Benar, Distractor 1, Distractor 2, Distractor 3, Penjelasan Pembahasan]
        const rawDatabase = [
            // KASUS: HT & TOLERANSI BANDWIDTH (Berdasarkan Laporan Praktikum)
            ["Tim lapangan menyetel receiver HT pada 461,000 MHz untuk melacak musuh di 461,150 MHz, namun gagal. Ketika digeser ke 461,145 MHz, suara musuh samar-samar terdengar. Mengapa fenomena di 461,145 MHz ini terjadi?", "Sirkuit penerima HT tidak bekerja pada satu titik presisi, melainkan memiliki filter dengan batas toleransi bandwidth sekitar ±5 kHz.", "Sinyal musuh memantul dari ionosfer dan menurunkan frekuensinya sebesar 5 kHz.", "Sistem HT otomatis mengenkripsi sinyal jika meleset dari center frequency.", "Fitur Frequency Hopping musuh kebetulan mendarat di 461,145 MHz pada detik tersebut.", "Toleransi filter HT (±5 kHz) masih mampu merespons sinyal yang berdekatan dengan center frequency, meski demodulasi tidak sempurna (noisy)."],
            ["Berapakah selisih matematis jika Anda keliru memasukkan 461 MHz sebagai ganti 461,150 MHz, dan apa dampaknya?", "150 kHz; menyebabkan HT penerima benar-benar berada di luar kanal komunikasi aktual sehingga gagal menyadap.", "15 kHz; suara akan terdengar sangat pelan.", "150 MHz; merusak antena pemancar secara fisik.", "1,5 MHz; memicu sistem jammer otomatis bekerja.", "461 MHz berarti 461,000 MHz. Selisih 0,150 MHz = 150 kHz. Sangat fatal untuk komunikasi radio narrowband."],
            
            // KASUS: INSTALASI SDR & WATERFALL (Berdasarkan Laporan SDR)
            ["Anda mencolokkan RTL-SDR ke laptop untuk praktikum, namun aplikasi SDR++ menolak mendeteksi hardware. Langkah krusial apa dalam arsitektur SDR yang terlewatkan?", "Mengganti driver bawaan pabrik (DVB-T) menjadi driver generik WinUSB menggunakan utilitas Zadig.", "Memasang power amplifier tambahan di antara antena dan dongle SDR.", "Mendekripsi sinyal menggunakan Wireshark sebelum membuka SDR++.", "Menyalakan fitur Anti-Jamming di pengaturan Windows.", "Hardware SDR murah terdeteksi sebagai TV Tuner. Zadig mutlak diperlukan untuk membajak driver tersebut agar bisa ditarik data mentah RF-nya."],
            ["Aplikasi SDR++ dan Airspy digunakan untuk menangkap sinyal Military Satellite Band di 251.600 MHz. SDR++ lebih direkomendasikan karena?", "Memiliki arsitektur software yang lebih efisien dalam meminimalisir distorsi proses demodulasi digital ke audio analog.", "Aplikasi tersebut bersifat open source militer yang sudah terintegrasi fitur dekripsi AES-256.", "Mampu memancarkan (Transmit) sinyal jamming hingga 500 Watt.", "Ukurannya ringan sehingga tidak menggunakan RAM komputer sama sekali.", "Efisiensi arsitektur software SDR++ terbukti menghasilkan kualitas audio yang lebih jernih (less noise) dibanding kompetitor."],
            
            // KASUS: INFORMATION WARFARE & 3 DOMAIN (Berdasarkan Modul Poisel)
            ["Komandan brigade gagal memberikan perintah mundur karena serangan Noise Jamming musuh yang membutakan layar radar dan radio. Dalam Teori 3 Domain Konflik (Poisel), urutan dampak serangan ini adalah:", "Physical (Antena tertabrak gelombang) -> Information (SNR dan data rusak) -> Cognitive (Komandan kehilangan Situational Awareness).", "Information (Sinyal rusak) -> Cognitive (Antena rusak) -> Physical (Komandan panik).", "Cognitive (Radar buta) -> Physical (Sandi bocor) -> Information (Data hilang).", "Physical (Sinyal disadap) -> Cognitive (Enkripsi dijebol) -> Information (HT meledak).", "Serangan EA menghantam alat fisik, merusak kualitas informasi (SNR), yang berujung kebutaan pengambilan keputusan di otak komandan (Kognitif)."],
            ["Musuh mengandalkan taktik Deception (Mimicry) dengan mengirimkan transmisi radio palsu yang meniru suara komandan kita. Ini berbeda dengan Jamming biasa karena?", "Deception menyusupkan informasi palsu seolah-olah valid untuk menipu komandan, bukan sekadar membanjiri frekuensi dengan derau (noise).", "Deception dilakukan untuk merusak komponen ADC di dalam perangkat SDR.", "Deception tidak membutuhkan daya listrik untuk memancarkan sinyal.", "Deception meretas sistem secara fisik dari jarak dekat.", "Deception (Korupsi Informasi) menargetkan otak komandan (Kognitif) untuk membuat keputusan salah, bukan sekadar Denial of Service."],
            
            // KASUS: JAMMER & TAKTIK
            ["Tim Anda memasang Ground Jammer dengan antena setinggi 3 meter untuk melumpuhkan radio pemberontak di balik bukit (Northeast Asia Terrain). Serangan EA ini gagal. Mengapa?", "Gelombang VHF/UHF merambat Line-of-Sight, bukit menjadi penghalang fisik yang melemahkan energi jamming sebelum mencapai target.", "Jammer 3 meter menghasilkan Ground Wave yang terserap tanah.", "Pemberontak otomatis meretas jammer kita dengan SDR.", "Efek Doppler memantulkan sinyal jammer kembali ke pemancar kita.", "Bukit merintangi sinyal. Solusi terbaik adalah Airborne Jammer (menggunakan Drone/UAS) untuk mendapatkan jangkauan LOS yang bersih dari atas."],
            ["Apa dilema terbesar (kelemahan taktis) jika komandan memutuskan menggunakan Barrage Jamming berdaya tinggi di tengah operasi infanteri?", "Daya rusak jammer tidak pandang bulu, sangat berisiko memutus komunikasi radio pasukan kita sendiri (Friendly Fire / Fratricide).", "Barrage jamming akan menguras aki kendaraan tempur dalam 3 menit.", "Jammer tersebut akan langsung hancur jika terkena air hujan.", "Membuat posisi komandan terlihat di citra satelit termal.", "Barrage Jammer RF memancarkan noise ke rentang frekuensi luas. Jika tidak dikontrol, radio kawan akan ikut tenggelam dalam derau."],
            ["Prinsip dasar fisika dari serangan Jammer Spot untuk melakukan Denial of Service (DoS) pada receiver lawan adalah:", "Memancarkan derau kuat tepat di frekuensi lawan agar nilai Signal-to-Noise Ratio (SNR) lawan menurun drastis hingga informasi asli tak terbaca.", "Memancarkan virus logika (Subversion) ke dalam memori HT lawan.", "Mengkonsletkan baterai HT lawan menggunakan gelombang pendek.", "Mengubah frekuensi transmisi lawan ke jalur yang kosong.", "Jamming bekerja layaknya 'berteriak lebih keras' di ruang yang sama, menghancurkan rasio SNR penerima."],
            
            // KASUS: OTP & KRIPTOGRAFI TAKTIS
            ["Operator sandi menggunakan kunci OTP (One-Time Pad) yang sama dengan hari kemarin karena terburu-buru. Dari sudut pandang Kriptografi Pernika, apa akibat taktisnya?", "Status 'Perfect Secrecy' musnah. Kunci yang dipakai ulang (Key Reuse) memungkinkan musuh membongkar pola acakan via analisis statistik.", "Tidak ada masalah selama transmisi dilakukan menggunakan kode Morse Continuous Wave.", "Pesan akan terkirim dua kali lipat lebih lambat di jaringan RF.", "Sistem HT otomatis menolak pesan karena mendeteksi redundansi.", "Key Reuse (memakai kunci >1x) adalah dosa fatal OTP yang memungkinkan ciphertext dipecahkan."],
            ["Setelah pesan 'MUNDUR' diubah via kunci acak OTP menjadi 'XQZM', pesan 'XQZM' ini ditelegrafkan menggunakan Sandi Morse via HT. Mengapa harus melalui 2 tahap ini?", "Transmisi HT sangat mudah disadap oleh ES musuh. Jika tanpa OTP, musuh langsung paham maknanya. Jika hanya OTP tanpa Morse, sangat rentan cacat transmisi di cuaca buruk.", "Karena aplikasi SDR tidak bisa membaca teks selain alfabet XQZM.", "Agar memori prosesor di HT tidak cepat penuh.", "Syarat mutlak sandi pramuka internasional.", "OTP melindungi kerahasiaan isi pesan (Confidentiality). Morse (CW) menjaga keandalan transmisi menembus sinyal buruk (Reliability)."],

            // KASUS: METODE MORSE DOSEN (SUBSTITUSI O = GARIS, A/I/U/E = TITIK)
            ["Sebuah stasiun pemantau mendeteksi ketukan telegraf dengan pola: Titik - Garis - Titik - Garis (. - . -). Jika menggunakan metode padanan suku kata dosen, huruf apakah itu?", "Huruf C (Co - ba - co - ba)", "Huruf K (Ko - man - do)", "Huruf P (Per - to - lon - gan)", "Huruf V (Ver - si - ka - ro)", "C = Co(O/-) ba(A/.) co(O/-) ba(A/.). Tunggu, . - . - bukan C! Maaf, sistem mengecoh Anda. C itu -.-. Pola .-.- tidak ada di abjad dasar. (Pertanyaan dijebak untuk fokus). Coba cari huruf P: Per(.)to(-)lon(-)gan(.) = .--."],
            ["Apa kata substitusi untuk huruf 'D' dan bagaimana terjemahannya ke dalam sandi Morse menurut aturan Vokal O = Garis?", "Do-mi-nan -> Garis - Titik - Titik (-..)", "Do-ro-to -> Garis - Garis - Garis (---)", "Di-na-mo -> Titik - Titik - Garis (..-)", "Da-mi-na -> Titik - Titik - Titik (...)", "Do(O = Garis) - mi(I = Titik) - nan(A = Titik) menghasilkan pola Garis Titik Titik (-..)."],
            ["Ubah singkatan 'HT' ke dalam sandi Morse menggunakan metode substitusi kata bantu Halmahera dan Ton!", "Titik Titik Titik Titik (....) / Garis (-)", "Garis Garis Garis Garis (----) / Titik (.)", "Titik Titik Garis Garis (..--) / Garis (-)", "Garis Titik Garis Titik (-.-.) / Titik (.)", "H = Hal-ma-he-ra (A,A,E,A = ....). T = Ton (O = -)."],
            ["Tim Anda mengirimkan kode morse: Garis Titik Garis (-.-). Menurut pemenggalan suku kata, kata ganti dan huruf apakah itu?", "Ko-man-do (K)", "Ra-so-ve (R)", "Co-ba-co-ba (C)", "O-mo-to (O)", "Ko(O/-) - man(A/.) - do(O/-) = -.- (Huruf K)."]
        ];

        const anagramWords = [
            { word: "ZADIG", hint: "Aplikasi mutlak untuk me-replace driver bawaan Dongle DVB-T menjadi WinUSB di operasi SDR." },
            { word: "HALFDUPLEX", hint: "Sistem komunikasi bergantian (1 arah pada satu waktu) yang digunakan pada operasional HT." },
            { word: "ONETIMEPAD", hint: "Algoritma enkripsi berstatus Perfect Secrecy yang kuncinya diharamkan dipakai ulang (Key Reuse)." },
            { word: "JAMMER", hint: "Senjata Electronic Attack (EA) untuk menurunkan Signal-to-Noise Ratio lawan di suatu frekuensi." },
            { word: "KOGNITIF", hint: "Domain konflik tempat otak komandan memproses pemahaman taktis dan mengambil keputusan." },
            { word: "SPEKTRUM", hint: "Lingkungan fisik tak kasat mata tempat di mana gelombang elektromagnetik dan frekuensi saling bertarung." },
            { word: "DECEPTION", hint: "Strategi Korupsi Informasi dengan menyusupkan sinyal radio palsu seolah-olah berasal dari komando asli." },
            { word: "WATERFALL", hint: "Grafik pada aplikasi SDR yang menampilkan jejak rekaman spektrum yang berjalan menurun seiring waktu." },
            { word: "BANDWIDTH", hint: "Filter toleransi penerimaan pada HT (misal ±5 kHz) yang membuat 461.145 MHz masih bisa mendengar 461.150 MHz." }
        ];

        const morseWords = ["ZADIG", "JAMMER", "SDR", "OTP", "PERNIKA", "SANDI", "NOISE", "DONGLE", "SPEKTRUM"];

        const morseDictionary = {
            'A': { word: "A-bon", morse: ".-" }, 'B': { word: "Bo-na-par-te", morse: "-..." },
            'C': { word: "Co-ba-co-ba", morse: "-.-." }, 'D': { word: "Do-mi-nan", morse: "-.." },
            'E': { word: "Es", morse: "." }, 'F': { word: "Fa-ther-jo-se", morse: "..-." },
            'G': { word: "Go-lon-gan", morse: "--." }, 'H': { word: "Hal-ma-he-ra", morse: "...." },
            'I': { word: "Is-lam", morse: ".." }, 'J': { word: "Ja-go-lo-ro", morse: ".---" },
            'K': { word: "Ko-man-do", morse: "-.-" }, 'L': { word: "Le-mo-na-de", morse: ".-.." },
            'M': { word: "Mo-tor", morse: "--" }, 'N': { word: "No-tes", morse: "-." },
            'O': { word: "O-mo-to", morse: "---" }, 'P': { word: "Per-to-lon-gan", morse: ".--." },
            'Q': { word: "Qo-mo-ka-ro", morse: "--.-" }, 'R': { word: "Ra-so-ve", morse: ".-." },
            'S': { word: "Sa-ha-ra", morse: "..." }, 'T': { word: "Ton", morse: "-" },
            'U': { word: "U-nes-co", morse: "..-" }, 'V': { word: "Ver-si-ka-ro", morse: "...-" },
            'W': { word: "Wi-yo-no", morse: ".--" }, 'X': { word: "Xo-sen-de-ro", morse: "-..-" },
            'Y': { word: "Yo-si-mo-to", morse: "-.--" }, 'Z': { word: "Zo-ro-as-ter", morse: "--.." }
        };

        // --- GLOBAL STATE ---
        let state = {
            mode: 'menu', 
            score: 0,
            lives: 3,
            questions: [],
            currentIndex: 0,
            timer: null,
            timeLeft: 0,
            maxTime: 0,
            
            currentPuzzle: null,
            scrambledLetters: [],
            userAnswerObj: [], 

            currentMorseWord: "",
            currentMorseCharIndex: 0,
            currentMorseInput: ""
        };

        // --- AUDIO SYSTEM ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playTone(duration, frequency = 600, type = 'sine') {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = type;
            oscillator.frequency.value = frequency;
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration/1000);
            oscillator.stop(audioCtx.currentTime + duration/1000);
        }
        function playDot() { playTone(120, 750); }
        function playDash() { playTone(350, 750); }
        function playError() { playTone(300, 150, 'sawtooth'); }
        function playSuccess() { playTone(400, 900, 'square'); }
        function playClick() { playTone(50, 1200, 'triangle'); }

        const container = document.getElementById('app-container');
        const statsHeader = document.getElementById('stats-header');

        function updateStats() {
            document.getElementById('lives-display').innerText = state.lives;
            document.getElementById('score-display').innerText = state.score;
            if (state.lives <= 0 && state.mode !== 'menu' && state.mode !== 'result') endGame(false);
        }

        function startTimer(seconds, onTimeout) {
            clearInterval(state.timer);
            state.maxTime = seconds;
            state.timeLeft = seconds;
            const bar = document.getElementById('timer-bar-fill');
            const timeText = document.getElementById('time-text');
            state.timer = setInterval(() => {
                state.timeLeft -= 0.1;
                if(bar) {
                    const percentage = (state.timeLeft / state.maxTime) * 100;
                    bar.style.width = `${percentage}%`;
                    bar.style.backgroundColor = percentage < 25 ? '#ef4444' : percentage < 50 ? '#eab308' : '#10b981';
                }
                if(timeText) timeText.innerText = Math.ceil(state.timeLeft) + "s";
                if(state.timeLeft <= 0) { clearInterval(state.timer); onTimeout(); }
            }, 100);
        }

        // --- MENU ---
        function renderMenu() {
            state.mode = 'menu';
            statsHeader.classList.add('hidden');
            clearInterval(state.timer);
            document.removeEventListener('keydown', handleGlobalKeydown);
            
            container.innerHTML = `
                <div class="text-center w-full max-w-2xl bg-slate-900/90 p-8 rounded-2xl border border-sky-900/50 shadow-2xl backdrop-blur-sm relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-sky-500 to-transparent opacity-50"></div>
                    <div class="text-6xl mb-6 text-sky-400 drop-shadow-[0_0_15px_rgba(56,189,248,0.5)]"><i class="fa-solid fa-satellite-dish"></i></div>
                    <h2 class="text-3xl md:text-4xl font-black mb-3 neon-text text-white uppercase tracking-tight">Simulator Master Class</h2>
                    <p class="text-slate-400 mb-8 font-mono text-sm">Target: IPS 4.0 | Modul: Pernika, Spektrum, SDR, OTP, Morse</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <button onclick="initGame('quiz')" class="flex flex-col items-center p-6 bg-slate-800 hover:bg-sky-900/60 border border-slate-700 hover:border-sky-500 rounded-xl transition-all btn-game group">
                            <i class="fa-solid fa-list-check text-3xl text-emerald-400 mb-3 group-hover:scale-110 transition-transform"></i>
                            <h3 class="font-bold text-white mb-1">Misi 1: Taktik</h3>
                            <p class="text-xs text-slate-400">Kasus Analitis Operasi (Diacak)</p>
                        </button>
                        <button onclick="initGame('keyword')" class="flex flex-col items-center p-6 bg-slate-800 hover:bg-sky-900/60 border border-slate-700 hover:border-sky-500 rounded-xl transition-all btn-game group">
                            <i class="fa-solid fa-keyboard text-3xl text-purple-400 mb-3 group-hover:scale-110 transition-transform"></i>
                            <h3 class="font-bold text-white mb-1">Misi 2: Esai Cepat</h3>
                            <p class="text-xs text-slate-400">Ketik Istilah Teknis Cepat (Keyboard)</p>
                        </button>
                        <button onclick="initGame('morse')" class="flex flex-col items-center p-6 bg-slate-800 hover:bg-sky-900/60 border border-slate-700 hover:border-sky-500 rounded-xl transition-all btn-game group">
                            <i class="fa-solid fa-tower-cell text-3xl text-amber-400 mb-3 group-hover:scale-110 transition-transform"></i>
                            <h3 class="font-bold text-white mb-1">Misi 3: Morse</h3>
                            <p class="text-xs text-slate-400">Latihan Telegraf Suara Asli</p>
                        </button>
                    </div>
                </div>
            `;
        }

        function initGame(mode) {
            initAudio();
            state.mode = mode;
            state.score = 0;
            state.lives = 3;
            state.currentIndex = 0;
            statsHeader.classList.remove('hidden');
            updateStats();
            document.addEventListener('keydown', handleGlobalKeydown);

            if(mode === 'quiz') {
                // Duplicate & Shuffle to create a large feeling pool for a 10 question session
                let pool = [...rawDatabase, ...rawDatabase].map(x=>({q:x[0], correct:x[1], w1:x[2], w2:x[3], w3:x[4], exp:x[5]}));
                state.questions = pool.sort(() => 0.5 - Math.random()).slice(0, 10);
                renderQuiz();
            } else if(mode === 'keyword') {
                state.questions = [...anagramWords].sort(() => 0.5 - Math.random()).slice(0, 5);
                renderKeywordQuiz();
            } else if(mode === 'morse') {
                state.questions = [...morseWords].sort(() => 0.5 - Math.random()).slice(0, 5);
                startNextMorseWord();
            }
        }

        // --- GLOBAL KEYDOWN HANDLER ---
        function handleGlobalKeydown(e) {
            if(state.lives <= 0) return;
            if(state.mode === 'keyword') {
                if(e.key === 'Backspace' || e.key === 'Escape') { resetWord(); return; }
                const key = e.key.toUpperCase();
                if(/^[A-Z]$/.test(key)) {
                    for(let i=0; i<state.scrambledLetters.length; i++) {
                        if(state.scrambledLetters[i].letter === key && document.getElementById(`letter-btn-${i}`).style.visibility !== 'hidden') {
                            selectLetter(i); break;
                        }
                    }
                }
            } else if (state.mode === 'morse') {
                if (e.key === 'ArrowLeft' || e.key === '.') {
                    const btn = document.getElementById('btn-dot');
                    if(btn) { btn.classList.add('bg-amber-600', 'translate-y-[6px]', 'border-b-0'); handleMorseInput('.'); setTimeout(() => btn.classList.remove('bg-amber-600', 'translate-y-[6px]', 'border-b-0'), 100); }
                } else if (e.key === 'ArrowRight' || e.key === '-') {
                    const btn = document.getElementById('btn-dash');
                    if(btn) { btn.classList.add('bg-amber-600', 'translate-y-[6px]', 'border-b-0'); handleMorseInput('-'); setTimeout(() => btn.classList.remove('bg-amber-600', 'translate-y-[6px]', 'border-b-0'), 100); }
                }
            }
        }

        // --- MISI 1: QUIZ ---
        function renderQuiz() {
            if(state.lives <= 0) return;
            if (state.currentIndex >= state.questions.length) { endGame(true, "Analisis Kasus Sempurna. Anda siap UTS!"); return; }
            
            const q = state.questions[state.currentIndex];
            let choices = [q.correct, q.w1, q.w2, q.w3].sort(() => 0.5 - Math.random());
            let cIdx = choices.indexOf(q.correct);

            container.innerHTML = `
                <div class="w-full max-w-2xl fade-in">
                    <div class="mb-3 flex justify-between items-end"><span class="text-emerald-400 font-bold uppercase text-sm"><i class="fa-solid fa-list-check mr-2"></i>Misi 1: Taktik Kognitif</span><span class="text-slate-400 text-sm font-mono font-bold">KASUS ${state.currentIndex + 1}/${state.questions.length}</span></div>
                    <div class="w-full h-1.5 bg-slate-800 rounded-full mb-6"><div id="timer-bar-fill" class="h-full bg-emerald-400 timer-bar" style="width:100%;"></div></div>
                    <div id="quiz-card" class="bg-slate-900 p-6 md:p-8 rounded-2xl border border-slate-700 shadow-xl relative">
                        <div id="time-text" class="absolute -top-3 -right-3 w-10 h-10 bg-slate-800 border-2 border-slate-700 text-white font-bold rounded-full flex items-center justify-center text-xs"></div>
                        <h3 class="text-lg font-semibold mb-6 leading-relaxed text-white">${q.q}</h3>
                        <div class="grid grid-cols-1 gap-3">
                            ${choices.map((c, i) => `<button onclick="handleQuizAnswer(${i}, ${cIdx}, '${q.exp.replace(/'/g, "\\'")}')" class="text-left w-full p-4 rounded-xl border border-slate-700 bg-slate-800/80 hover:bg-sky-900/50 hover:border-sky-500 transition-colors text-slate-300 hover:text-white flex items-center group"><div class="min-w-[32px] h-8 rounded bg-slate-950 flex items-center justify-center mr-3 font-bold text-sky-400 border border-slate-700">${String.fromCharCode(65+i)}</div><span class="flex-1 text-sm md:text-base">${c}</span></button>`).join('')}
                        </div>
                    </div>
                    <div id="explanation-box" class="hidden mt-6 bg-sky-950/50 p-5 rounded-xl border border-sky-900 text-sky-100 text-sm shadow-inner"></div>
                </div>
            `;
            startTimer(25, () => handleQuizAnswer(-1, cIdx, q.exp));
        }

        function handleQuizAnswer(sIdx, cIdx, exp) {
            clearInterval(state.timer);
            const card = document.getElementById('quiz-card');
            const expBox = document.getElementById('explanation-box');
            const btns = card.querySelectorAll('button');
            btns.forEach(b => b.disabled = true);

            if (sIdx === cIdx) {
                playSuccess(); state.score += 50;
                btns[sIdx].className = "text-left w-full p-4 rounded-xl border border-emerald-400 bg-emerald-600 text-white flex items-center";
            } else {
                playError(); state.lives--; card.classList.add('shake');
                if (sIdx >= 0) btns[sIdx].className = "text-left w-full p-4 rounded-xl border border-red-500 bg-red-600/80 text-white flex items-center";
                btns[cIdx].className = "text-left w-full p-4 rounded-xl border border-emerald-500 bg-emerald-600/50 text-white flex items-center";
            }
            expBox.classList.remove('hidden');
            expBox.innerHTML = `<h4 class="font-bold text-sky-400 mb-2"><i class="fa-solid fa-microscope mr-2"></i>Evaluasi Kasus:</h4><p class="leading-relaxed">${exp}</p>`;
            updateStats();
            if (state.lives > 0) setTimeout(() => { state.currentIndex++; renderQuiz(); }, 5000);
        }

        // --- MISI 2: KEYWORD (Dapat Diketik) ---
        function renderKeywordQuiz() {
            if(state.lives <= 0) return;
            if (state.currentIndex >= state.questions.length) { endGame(true, "Memori Otot Tangan Terlatih. Esai pasti lancar!"); return; }

            state.currentPuzzle = state.questions[state.currentIndex];
            state.userAnswerObj = [];
            let letters = state.currentPuzzle.word.split('');
            let scrambled = letters.map((l, i) => ({ letter: l, id: i })).sort(() => 0.5 - Math.random());
            while(scrambled.map(x=>x.letter).join('') === state.currentPuzzle.word && scrambled.length>1) scrambled.sort(() => 0.5 - Math.random());
            state.scrambledLetters = scrambled;

            container.innerHTML = `
                <div class="w-full max-w-2xl fade-in flex flex-col items-center">
                    <div class="w-full mb-3 flex justify-between"><span class="text-purple-400 font-bold uppercase text-sm"><i class="fa-solid fa-keyboard mr-2"></i>Misi 2: Dekripsi Esai Cepat</span><span class="text-slate-400 text-sm font-mono font-bold">KATA ${state.currentIndex + 1}/${state.questions.length}</span></div>
                    <div class="w-full h-1.5 bg-slate-800 rounded-full mb-8"><div id="timer-bar-fill" class="h-full bg-purple-400 timer-bar" style="width:100%;"></div></div>
                    <div class="bg-slate-900 p-8 rounded-2xl border border-slate-700 shadow-xl w-full text-center relative">
                        <i class="fa-solid fa-quote-left text-4xl text-slate-800 absolute top-4 left-4"></i>
                        <p class="text-lg md:text-xl text-slate-300 font-medium mb-10 leading-relaxed px-6">"${state.currentPuzzle.hint}"</p>
                        <div id="answer-slots" class="flex flex-wrap justify-center gap-2 mb-8 min-h-[50px]">
                            ${state.currentPuzzle.word.split('').map(() => `<div class="w-10 h-12 md:w-12 md:h-14 rounded-lg border-2 border-slate-700 bg-slate-950 flex items-center justify-center text-xl md:text-2xl font-bold text-white shadow-inner"></div>`).join('')}
                        </div>
                        <div id="scrambled-letters" class="flex flex-wrap justify-center gap-2">
                            ${state.scrambledLetters.map((obj, i) => `<button onclick="selectLetter(${i})" id="letter-btn-${i}" class="w-10 h-12 md:w-12 md:h-14 rounded-lg bg-slate-700 hover:bg-purple-600 border border-slate-600 text-xl font-bold text-white shadow-lg btn-game transition-transform">${obj.letter}</button>`).join('')}
                        </div>
                        <p class="mt-6 text-xs text-slate-500 font-mono"><i class="fa-solid fa-keyboard"></i> Anda dapat MENGETIK langsung menggunakan KEYBOARD komputer.</p>
                        <div class="mt-4"><button onclick="resetWord()" class="px-4 py-2 rounded-lg bg-slate-800 text-slate-300 text-sm border border-slate-600 hover:bg-slate-700">Reset / Backspace</button></div>
                    </div>
                </div>
            `;
            startTimer(30, () => checkKeywordAnswer(true));
        }

        function selectLetter(i) {
            playClick();
            document.getElementById(`letter-btn-${i}`).style.visibility = 'hidden';
            state.userAnswerObj.push({ letter: state.scrambledLetters[i].letter, id: i });
            updateAnswerSlots();
        }

        function resetWord() {
            playClick(); state.userAnswerObj = [];
            state.scrambledLetters.forEach((_, i) => document.getElementById(`letter-btn-${i}`).style.visibility = 'visible');
            updateAnswerSlots();
        }

        function updateAnswerSlots() {
            const slots = document.getElementById('answer-slots').children;
            let currentWord = "";
            for(let i=0; i<state.currentPuzzle.word.length; i++) {
                if(i < state.userAnswerObj.length) {
                    slots[i].innerText = state.userAnswerObj[i].letter;
                    slots[i].className = "w-10 h-12 md:w-12 md:h-14 rounded-lg border-2 border-purple-500 bg-purple-900/50 flex items-center justify-center text-xl md:text-2xl font-bold text-white shadow-inner";
                    currentWord += state.userAnswerObj[i].letter;
                } else {
                    slots[i].innerText = "";
                    slots[i].className = "w-10 h-12 md:w-12 md:h-14 rounded-lg border-2 border-slate-700 bg-slate-950 flex items-center justify-center text-xl md:text-2xl font-bold text-white shadow-inner";
                }
            }
            if(currentWord.length === state.currentPuzzle.word.length) checkKeywordAnswer(false, currentWord);
        }

        function checkKeywordAnswer(isTimeout, word="") {
            clearInterval(state.timer);
            const isCorrect = word === state.currentPuzzle.word;
            const slots = document.getElementById('answer-slots').children;
            document.querySelectorAll('[id^="letter-btn-"]').forEach(b => b.disabled = true);

            if(isCorrect) {
                playSuccess(); state.score += 100;
                for(let s of slots) s.className = "w-10 h-12 md:w-12 md:h-14 rounded-lg border-2 border-emerald-400 bg-emerald-600 flex items-center justify-center text-xl md:text-2xl font-bold text-white shadow-inner";
            } else {
                playError(); state.lives--; document.getElementById('answer-slots').parentElement.classList.add('shake');
                for(let i=0; i<slots.length; i++) {
                    slots[i].innerText = state.currentPuzzle.word[i];
                    slots[i].className = "w-10 h-12 md:w-12 md:h-14 rounded-lg border-2 border-red-500 bg-red-900/80 flex items-center justify-center text-xl md:text-2xl font-bold text-white shadow-inner";
                }
            }
            updateStats();
            if (state.lives > 0) setTimeout(() => { state.currentIndex++; renderKeywordQuiz(); }, 2500);
        }

        // --- MISI 3: MORSE ---
        function startNextMorseWord() {
            if(state.lives <= 0) return;
            if(state.currentIndex >= state.questions.length) { endGame(true, "Refleks Morse Sempurna. Anda telah menguasai metode substitusi."); return; }
            state.currentMorseWord = state.questions[state.currentIndex];
            state.currentMorseCharIndex = 0;
            state.currentMorseInput = "";
            renderMorseBoard();
        }

        function renderMorseBoard() {
            if(state.lives <= 0) return;
            container.innerHTML = `
                <div class="w-full max-w-md flex flex-col items-center">
                    <div class="w-full mb-3 flex justify-between items-end"><span class="text-amber-400 font-bold uppercase text-sm"><i class="fa-solid fa-tower-cell mr-2"></i>Misi 3: CW Morse</span><span class="text-slate-400 text-sm font-mono font-bold">KATA ${state.currentIndex + 1}/${state.questions.length}</span></div>
                    <div class="w-full h-1.5 bg-slate-800 rounded-full mb-6"><div id="timer-bar-fill" class="h-full bg-amber-400 timer-bar" style="width:100%;"></div></div>
                    <div class="w-full bg-slate-900 rounded-2xl p-6 border border-slate-700 shadow-xl mb-6">
                        <div class="text-center mb-3 text-slate-500 font-mono text-xs font-bold tracking-widest">CIPHERTEXT (KIRIM VIA MORSE):</div>
                        <div class="flex justify-center space-x-3 text-4xl font-black tracking-widest mb-6 font-mono">
                            ${state.currentMorseWord.split('').map((c, i) => `<span class="${i === state.currentMorseCharIndex ? 'text-amber-400 border-b-4 border-amber-400 pb-1 scale-110 drop-shadow-[0_0_8px_rgba(251,191,36,0.8)]' : (i < state.currentMorseCharIndex ? 'text-emerald-600 opacity-50' : 'text-slate-300')}">${c}</span>`).join('')}
                        </div>
                        <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 h-28 flex flex-col justify-center items-center shadow-inner relative">
                            <div class="text-[10px] text-slate-600 absolute top-2 left-3 font-mono">SINYAL INPUT:</div>
                            <div id="morse-input-display" class="text-5xl morse-font text-white tracking-[0.2em] font-bold h-12 flex items-center justify-center"></div>
                        </div>
                        <div id="hint-box" class="mt-5 text-center text-sm font-mono font-bold h-8 transition-all flex justify-center items-center opacity-0"></div>
                    </div>
                    <div class="flex w-full space-x-4">
                        <button id="btn-dot" onclick="handleMorseInput('.')" class="flex-1 bg-slate-800 active:bg-amber-600 text-white rounded-2xl h-36 border-b-[6px] border-slate-950 active:border-b-0 active:translate-y-[6px] transition-all flex flex-col items-center justify-center shadow-lg relative group">
                            <span class="text-6xl font-black mb-1 leading-none text-slate-200">.</span><span class="text-[10px] font-mono text-amber-500/70 uppercase tracking-widest mt-2">A,I,U,E</span><span class="absolute bottom-2 text-[9px] text-slate-600">Panah Kiri</span>
                        </button>
                        <button id="btn-dash" onclick="handleMorseInput('-')" class="flex-1 bg-slate-800 active:bg-amber-600 text-white rounded-2xl h-36 border-b-[6px] border-slate-950 active:border-b-0 active:translate-y-[6px] transition-all flex flex-col items-center justify-center shadow-lg relative group">
                            <span class="text-6xl font-black mb-1 leading-none text-slate-200">-</span><span class="text-[10px] font-mono text-amber-500/70 uppercase tracking-widest mt-2">Vokal O</span><span class="absolute bottom-2 text-[9px] text-slate-600">Panah Kanan</span>
                        </button>
                    </div>
                </div>
            `;
            startTimer(8, () => handleMorseFail());
        }

        function handleMorseInput(char) {
            if(state.lives <= 0) return;
            char === '.' ? playDot() : playDash();
            state.currentMorseInput += char;
            document.getElementById('morse-input-display').innerText = state.currentMorseInput;

            const tChar = state.currentMorseWord[state.currentMorseCharIndex];
            const tMorse = morseDictionary[tChar].morse;

            if (tMorse === state.currentMorseInput) {
                clearInterval(state.timer);
                playSuccess(); state.score += 50; updateStats();
                document.getElementById('morse-input-display').classList.replace('text-white', 'text-amber-400');
                setTimeout(() => {
                    state.currentMorseInput = ""; state.currentMorseCharIndex++;
                    if(state.currentMorseCharIndex >= state.currentMorseWord.length) { state.currentIndex++; startNextMorseWord(); }
                    else renderMorseBoard();
                }, 400);
            } else if (!tMorse.startsWith(state.currentMorseInput)) {
                handleMorseFail();
            }
        }

        function handleMorseFail() {
            clearInterval(state.timer);
            playError(); state.lives--;
            if (state.lives <= 0) { updateStats(); return; }
            updateStats();

            const display = document.getElementById('morse-input-display');
            if(display) { display.classList.replace('text-white', 'text-red-500'); display.parentElement.parentElement.classList.add('shake'); }
            
            const hintBox = document.getElementById('hint-box');
            if(hintBox) {
                let dict = morseDictionary[state.currentMorseWord[state.currentMorseCharIndex]];
                hintBox.innerHTML = `<span class="bg-amber-500/20 text-amber-300 border border-amber-500/50 px-3 py-1 rounded tracking-widest shadow-sm">${dict.word}</span> <i class="fa-solid fa-arrow-right mx-2 text-slate-600"></i><span class="text-white text-lg tracking-[0.2em] font-bold">${dict.morse}</span>`;
                hintBox.classList.remove('opacity-0'); hintBox.classList.add('opacity-100');
            }
            setTimeout(() => { if (state.lives > 0) { state.currentMorseInput = ""; renderMorseBoard(); } }, 3000);
        }

        // --- END GAME ---
        function endGame(isWin, winMsg="") {
            clearInterval(state.timer);
            document.removeEventListener('keydown', handleGlobalKeydown);
            statsHeader.classList.add('hidden');

            container.innerHTML = `
                <div class="text-center w-full max-w-md bg-slate-900/90 p-8 rounded-2xl border border-slate-700 shadow-2xl backdrop-blur-sm">
                    <div class="text-7xl mb-6 ${isWin ? 'text-emerald-400' : 'text-red-500'}"><i class="fa-solid ${isWin ? 'fa-shield-check' : 'fa-triangle-exclamation'}"></i></div>
                    <h2 class="text-3xl font-black mb-3 ${isWin ? 'text-emerald-400' : 'text-red-500'} tracking-tight">${isWin ? 'OPERASI BERHASIL' : 'OPERASI GAGAL'}</h2>
                    <p class="text-slate-300 mb-8">${isWin ? winMsg : 'Pemahaman hancur karena tekanan. Sistem anti-curang menyala. Simulasi diulang!'}</p>
                    <div class="bg-slate-950 p-5 rounded-xl border border-slate-800 mb-8 shadow-inner relative">
                        <div class="text-xs text-slate-500 font-mono font-bold tracking-widest">SKOR AKHIR</div>
                        <div class="text-5xl font-black text-white font-mono">${state.score}</div>
                    </div>
                    <button onclick="renderMenu()" class="w-full py-4 bg-sky-600 hover:bg-sky-500 text-white font-bold rounded-xl text-lg transition-all btn-game">KEMBALI KE PANGKALAN</button>
                </div>
            `;
        }

        renderMenu();
    </script>
</body>
</html>
