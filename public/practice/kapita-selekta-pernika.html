        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(14, 165, 233, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -2;
        }
        
        .radar-sweep {
            position: fixed;
            top: 50%; left: 50%; width: 150vw; height: 150vw;
            margin-top: -75vw; margin-left: -75vw;
            background: conic-gradient(from 0deg, transparent 70%, rgba(16, 185, 129, 0.1) 100%);
            border-radius: 50%;
            animation: sweep 4s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes sweep { 100% { transform: rotate(360deg); } }

        .btn-game { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-game:active:not(:disabled) { transform: scale(0.95); }
        .btn-game:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .timer-bar { transition: width 0.1s linear, background-color 0.3s; }

        function shuffleArray(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {

                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function buildBalancedQuiz() {
            // Target: 7 pertemuan sebelum UTS. Diambil minimal 2 soal dari tiap pertemuan agar tidak ada materi yang hilang.
            const selected = [];
            const selectedKeys = new Set();
            lessonDatabase.forEach(group => {
                shuffleArray(group.items).slice(0, 2).forEach(item => { selected.push(item); selectedKeys.add(item[0]); });
            });
            const rest = shuffleArray(rawDatabase).filter(item => !selectedKeys.has(item[0]));
            // Tambahan 2 soal random agar latihan tetap variatif, total 16 soal tanpa pengulangan.
            rest.slice(0, 2).forEach(item => selected.push(item));
            return shuffleArray(selected);
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;

        function initAudio() {

        function playTone(duration, frequency = 600, type = 'sine') {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = type;
            oscillator.frequency.value = frequency;
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration/1000);
            oscillator.stop(audioCtx.currentTime + duration/1000);
        }
        function playDot() { playTone(120, 750); }
        function playDash() { playTone(350, 750); }
        function playError() { playTone(300, 150, 'sawtooth'); }

        function handleGlobalKeydown(e) {
            if(state.lives <= 0) return;
            if(state.mode === 'keyword') {
                if(e.key === 'Backspace' || e.key === 'Escape') { resetWord(); return; }
                const key = e.key.toUpperCase();
                if(/^[A-Z]$/.test(key)) {
                    for(let i=0; i<state.scrambledLetters.length; i++) {
                        if(state.scrambledLetters[i].letter === key && document.getElementById(`letter-btn-${i}`).style.visibility !== 'hidden') {
                            selectLetter(i); break;

                    }

            } else if (state.mode === 'morse') {
                if (e.key === 'ArrowLeft' || e.key === '.') {

            const expBox = document.getElementById('explanation-box');
            const btns = card.querySelectorAll('button');
            btns.forEach(b => b.disabled = true);

            if (sIdx === cIdx) {
                playSuccess(); state.score += 50;
                btns[sIdx].className = "text-left w-full p-4 rounded-xl border border-emerald-400 bg-emerald-600 text-white flex items-center";
            } else {
                playError(); state.lives--; card.classList.add('shake');
                if (sIdx >= 0) btns[sIdx].className = "text-left w-full p-4 rounded-xl border border-red-500 bg-red-600/80 text-white flex items-center";
                btns[cIdx].className = "text-left w-full p-4 rounded-xl border border-emerald-500 bg-emerald-600/50 text-white flex items-center";
            }
            expBox.classList.remove('hidden');
            expBox.innerHTML = `<h4 class="font-bold text-sky-400 mb-2"><i class="fa-solid fa-microscope mr-2"></i>Evaluasi Kasus:</h4><p class="leading-relaxed">${exp}</p>`;
            updateStats();
            if (state.lives > 0) setTimeout(() => { state.currentIndex++; renderQuiz(); }, 5000);
        }

        // --- MISI 2: KEYWORD (Dapat Diketik) ---
        function renderKeywordQuiz() {
            if(state.lives <= 0) return;
            if (state.currentIndex >= state.questions.length) { endGame(true, "Memori Otot Tangan Terlatih. Esai pasti lancar!"); return; }

            state.currentPuzzle = state.questions[state.currentIndex];
            state.userAnswerObj = [];
            let letters = state.currentPuzzle.word.split('');
            let scrambled = letters.map((l, i) => ({ letter: l, id: i })).sort(() => 0.5 - Math.random());
            while(scrambled.map(x=>x.letter).join('') === state.currentPuzzle.word && scrambled.length>1) scrambled.sort(() => 0.5 - Math.random());
            state.scrambledLetters = scrambled;

            container.innerHTML = `
                <div class="w-full max-w-2xl fade-in flex flex-col items-center">
                    <div class="w-full mb-3 flex justify-between"><span class="text-purple-400 font-bold uppercase text-sm"><i class="fa-solid fa-keyboard mr-2"></i>Misi 2: Dekripsi Esai Cepat</span><span class="text-slate-400 text-sm font-mono font-bold">KATA ${state.currentIndex + 1}/${state.questions.length}</span></div>
                    <div class="w-full h-1.5 bg-slate-800 rounded-full mb-8"><div id="timer-bar-fill" class="h-full bg-purple-400 timer-bar" style="width:100%;"></div></div>
                    <div class="bg-slate-900 p-8 rounded-2xl border border-slate-700 shadow-xl w-full text-center relative">
                        <i class="fa-solid fa-quote-left text-4xl text-slate-800 absolute top-4 left-4"></i>
                        <p class="text-lg md:text-xl text-slate-300 font-medium mb-10 leading-relaxed px-6">"${state.currentPuzzle.hint}"</p>
                        <div id="answer-slots" class="flex flex-wrap justify-center gap-2 mb-8 min-h-[50px]">
                            ${state.currentPuzzle.word.split('').map(() => `<div class="w-10 h-12 md:w-12 md:h-14 rounded-lg border-2 border-slate-700 bg-slate-950 flex items-center justify-center text-xl md:text-2xl font-bold text-white shadow-inner"></div>`).join('')}
                        </div>
                        <div id="scrambled-letters" class="flex flex-wrap justify-center gap-2">
                            ${state.scrambledLetters.map((obj, i) => `<button onclick="selectLetter(${i})" id="letter-btn-${i}" class="w-10 h-12 md:w-12 md:h-14 rounded-lg bg-slate-700 hover:bg-purple-600 border border-slate-600 text-xl font-bold text-white shadow-lg btn-game transition-transform">${obj.letter}</button>`).join('')}
                        </div>
                        <p class="mt-6 text-xs text-slate-500 font-mono"><i class="fa-solid fa-keyboard"></i> Anda dapat MENGETIK langsung menggunakan KEYBOARD komputer.</p>
                        <div class="mt-4"><button onclick="resetWord()" class="px-4 py-2 rounded-lg bg-slate-800 text-slate-300 text-sm border border-slate-600 hover:bg-slate-700">Reset / Backspace</button></div>
                    </div>
                </div>
            `;
            startTimer(30, () => checkKeywordAnswer(true));
        }

        function selectLetter(i) {
            playClick();
            document.getElementById(`letter-btn-${i}`).style.visibility = 'hidden';
            state.userAnswerObj.push({ letter: state.scrambledLetters[i].letter, id: i });
            updateAnswerSlots();
        }

        function resetWord() {
            playClick(); state.userAnswerObj = [];
            state.scrambledLetters.forEach((_, i) => document.getElementById(`letter-btn-${i}`).style.visibility = 'visible');
            updateAnswerSlots();
        }

        function updateAnswerSlots() {
            const slots = document.getElementById('answer-slots').children;
            let currentWord = "";
            for(let i=0; i<state.currentPuzzle.word.length; i++) {
                if(i < state.userAnswerObj.length) {
                    slots[i].innerText = state.userAnswerObj[i].letter;
                    slots[i].className = "w-10 h-12 md:w-12 md:h-14 rounded-lg border-2 border-purple-500 bg-purple-900/50 flex items-center justify-center text-xl md:text-2xl font-bold text-white shadow-inner";
                    currentWord += state.userAnswerObj[i].letter;
                } else {
                    slots[i].innerText = "";
                    slots[i].className = "w-10 h-12 md:w-12 md:h-14 rounded-lg border-2 border-slate-700 bg-slate-950 flex items-center justify-center text-xl md:text-2xl font-bold text-white shadow-inner";
                }
            }
            if(currentWord.length === state.currentPuzzle.word.length) checkKeywordAnswer(false, currentWord);
        }

        function checkKeywordAnswer(isTimeout, word="") {
            clearInterval(state.timer);
            const isCorrect = word === state.currentPuzzle.word;
            const slots = document.getElementById('answer-slots').children;
            document.querySelectorAll('[id^="letter-btn-"]').forEach(b => b.disabled = true);

            if(isCorrect) {
                playSuccess(); state.score += 100;
                for(let s of slots) s.className = "w-10 h-12 md:w-12 md:h-14 rounded-lg border-2 border-emerald-400 bg-emerald-600 flex items-center justify-center text-xl md:text-2xl font-bold text-white shadow-inner";
            } else {
                playError(); state.lives--; document.getElementById('answer-slots').parentElement.classList.add('shake');
                for(let i=0; i<slots.length; i++) {
                    slots[i].innerText = state.currentPuzzle.word[i];
                    slots[i].className = "w-10 h-12 md:w-12 md:h-14 rounded-lg border-2 border-red-500 bg-red-900/80 flex items-center justify-center text-xl md:text-2xl font-bold text-white shadow-inner";
                }
            }
            updateStats();
            if (state.lives > 0) setTimeout(() => { state.currentIndex++; renderKeywordQuiz(); }, 2500);
        }

        // --- MISI 3: MORSE ---
        function startNextMorseWord() {
            if(state.lives <= 0) return;
            if(state.currentIndex >= state.questions.length) { endGame(true, "Refleks Morse Sempurna. Anda telah menguasai metode substitusi."); return; }
            state.currentMorseWord = state.questions[state.currentIndex];
            state.currentMorseCharIndex = 0;
            state.currentMorseInput = "";
            renderMorseBoard();
        }

        function renderMorseBoard() {
            if(state.lives <= 0) return;
            container.innerHTML = `
                <div class="w-full max-w-md flex flex-col items-center">
                    <div class="w-full mb-3 flex justify-between items-end"><span class="text-amber-400 font-bold uppercase text-sm"><i class="fa-solid fa-tower-cell mr-2"></i>Misi 3: CW Morse</span><span class="text-slate-400 text-sm font-mono font-bold">KATA ${state.currentIndex + 1}/${state.questions.length}</span></div>
                    <div class="w-full h-1.5 bg-slate-800 rounded-full mb-6"><div id="timer-bar-fill" class="h-full bg-amber-400 timer-bar" style="width:100%;"></div></div>
                    <div class="w-full bg-slate-900 rounded-2xl p-6 border border-slate-700 shadow-xl mb-6">
                        <div class="text-center mb-3 text-slate-500 font-mono text-xs font-bold tracking-widest">CIPHERTEXT (KIRIM VIA MORSE):</div>
                        <div class="flex justify-center space-x-3 text-4xl font-black tracking-widest mb-6 font-mono">
                            ${state.currentMorseWord.split('').map((c, i) => `<span class="${i === state.currentMorseCharIndex ? 'text-amber-400 border-b-4 border-amber-400 pb-1 scale-110 drop-shadow-[0_0_8px_rgba(251,191,36,0.8)]' : (i < state.currentMorseCharIndex ? 'text-emerald-600 opacity-50' : 'text-slate-300')}">${c}</span>`).join('')}
                        </div>
                        <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 h-28 flex flex-col justify-center items-center shadow-inner relative">
                            <div class="text-[10px] text-slate-600 absolute top-2 left-3 font-mono">SINYAL INPUT:</div>
                            <div id="morse-input-display" class="text-5xl morse-font text-white tracking-[0.2em] font-bold h-12 flex items-center justify-center"></div>
                        </div>
                        <div id="hint-box" class="mt-5 text-center text-sm font-mono font-bold h-8 transition-all flex justify-center items-center opacity-0"></div>
                    </div>
                    <div class="flex w-full space-x-4">
                        <button id="btn-dot" onclick="handleMorseInput('.')" class="flex-1 bg-slate-800 active:bg-amber-600 text-white rounded-2xl h-36 border-b-[6px] border-slate-950 active:border-b-0 active:translate-y-[6px] transition-all flex flex-col items-center justify-center shadow-lg relative group">
                            <span class="text-6xl font-black mb-1 leading-none text-slate-200">.</span><span class="text-[10px] font-mono text-amber-500/70 uppercase tracking-widest mt-2">A,I,U,E</span><span class="absolute bottom-2 text-[9px] text-slate-600">Panah Kiri</span>
                        </button>
                        <button id="btn-dash" onclick="handleMorseInput('-')" class="flex-1 bg-slate-800 active:bg-amber-600 text-white rounded-2xl h-36 border-b-[6px] border-slate-950 active:border-b-0 active:translate-y-[6px] transition-all flex flex-col items-center justify-center shadow-lg relative group">
                            <span class="text-6xl font-black mb-1 leading-none text-slate-200">-</span><span class="text-[10px] font-mono text-amber-500/70 uppercase tracking-widest mt-2">Vokal O</span><span class="absolute bottom-2 text-[9px] text-slate-600">Panah Kanan</span>
                        </button>
                    </div>
                </div>
            `;
            startTimer(8, () => handleMorseFail());
        }

        function handleMorseInput(char) {
            if(state.lives <= 0) return;
            char === '.' ? playDot() : playDash();
            state.currentMorseInput += char;
            document.getElementById('morse-input-display').innerText = state.currentMorseInput;

            const tChar = state.currentMorseWord[state.currentMorseCharIndex];
            const tMorse = morseDictionary[tChar].morse;

            if (tMorse === state.currentMorseInput) {
                clearInterval(state.timer);
                playSuccess(); state.score += 50; updateStats();
                document.getElementById('morse-input-display').classList.replace('text-white', 'text-amber-400');
                setTimeout(() => {
                    state.currentMorseInput = ""; state.currentMorseCharIndex++;
                    if(state.currentMorseCharIndex >= state.currentMorseWord.length) { state.currentIndex++; startNextMorseWord(); }
                    else renderMorseBoard();
                }, 400);
            } else if (!tMorse.startsWith(state.currentMorseInput)) {
                handleMorseFail();
            }
        }

        function handleMorseFail() {
            clearInterval(state.timer);
            playError(); state.lives--;
            if (state.lives <= 0) { updateStats(); return; }
            updateStats();

            const display = document.getElementById('morse-input-display');
            if(display) { display.classList.replace('text-white', 'text-red-500'); display.parentElement.parentElement.classList.add('shake'); }
            
            const hintBox = document.getElementById('hint-box');
            if(hintBox) {
                let dict = morseDictionary[state.currentMorseWord[state.currentMorseCharIndex]];
                hintBox.innerHTML = `<span class="bg-amber-500/20 text-amber-300 border border-amber-500/50 px-3 py-1 rounded tracking-widest shadow-sm">${dict.word}</span> <i class="fa-solid fa-arrow-right mx-2 text-slate-600"></i><span class="text-white text-lg tracking-[0.2em] font-bold">${dict.morse}</span>`;
                hintBox.classList.remove('opacity-0'); hintBox.classList.add('opacity-100');
            }
            setTimeout(() => { if (state.lives > 0) { state.currentMorseInput = ""; renderMorseBoard(); } }, 3000);
        }

        // --- END GAME ---
        function endGame(isWin, winMsg="") {
            clearInterval(state.timer);
            document.removeEventListener('keydown', handleGlobalKeydown);
            statsHeader.classList.add('hidden');

            container.innerHTML = `
                <div class="text-center w-full max-w-md bg-slate-900/90 p-8 rounded-2xl border border-slate-700 shadow-2xl backdrop-blur-sm">
                    <div class="text-7xl mb-6 ${isWin ? 'text-emerald-400' : 'text-red-500'}"><i class="fa-solid ${isWin ? 'fa-shield-check' : 'fa-triangle-exclamation'}"></i></div>
                    <h2 class="text-3xl font-black mb-3 ${isWin ? 'text-emerald-400' : 'text-red-500'} tracking-tight">${isWin ? 'OPERASI BERHASIL' : 'OPERASI GAGAL'}</h2>
                    <p class="text-slate-300 mb-8">${isWin ? winMsg : 'Pemahaman hancur karena tekanan. Sistem anti-curang menyala. Simulasi diulang!'}</p>
                    <div class="bg-slate-950 p-5 rounded-xl border border-slate-800 mb-8 shadow-inner relative">
                        <div class="text-xs text-slate-500 font-mono font-bold tracking-widest">SKOR AKHIR</div>
                        <div class="text-5xl font-black text-white font-mono">${state.score}</div>
                    </div>
                    <button onclick="renderMenu()" class="w-full py-4 bg-sky-600 hover:bg-sky-500 text-white font-bold rounded-xl text-lg transition-all btn-game">KEMBALI KE PANGKALAN</button>
                </div>
            `;
        }

        renderMenu();
    </script>
</body>
</html>
