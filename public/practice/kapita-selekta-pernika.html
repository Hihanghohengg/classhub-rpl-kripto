        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();

        function playTone(duration, frequency = 600, type = 'sine') {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = type;
            oscillator.frequency.value = frequency;
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration/1000);
            oscillator.stop(audioCtx.currentTime + duration/1000);
        }

            const timeText = document.getElementById('time-text');
            
            state.timer = setInterval(() => {
                state.timeLeft -= 0.1;
                if(bar) {
                    const percentage = (state.timeLeft / state.maxTime) * 100;
                    bar.style.width = `${percentage}%`;
                    if(percentage < 25) bar.style.backgroundColor = '#ef4444'; 
                    else if(percentage < 50) bar.style.backgroundColor = '#eab308'; 
                    else bar.style.backgroundColor = '#10b981'; 
                }
                if(timeText) timeText.innerText = Math.ceil(state.timeLeft) + "s";
                
                if(state.timeLeft <= 0) {
                    clearInterval(state.timer);
                    onTimeout();
                }
            }, 100);
        }

        function renderMenu() {
            state.mode = 'menu';
            statsHeader.classList.add('hidden');
            clearInterval(state.timer);
            document.onkeydown = null;
            container.innerHTML = `
                <div class="text-center w-full max-w-2xl bg-slate-900/90 p-8 rounded-2xl border border-sky-900/50 shadow-2xl backdrop-blur-sm relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-sky-500 to-transparent opacity-50"></div>
                    
                    <div class="text-6xl mb-6 text-sky-400 drop-shadow-[0_0_15px_rgba(56,189,248,0.5)]">
                        <i class="fa-solid fa-microchip"></i>
                    </div>
                    <h2 class="text-3xl md:text-4xl font-black mb-3 neon-text text-white uppercase tracking-tight">Simulator UTS</h2>
                    <p class="text-slate-400 mb-8 font-mono text-sm">Target Operasi: IPS 4.0 | Sistem Evaluasi Taktis</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <button onclick="initGame('quiz')" class="flex flex-col items-center p-6 bg-slate-800 hover:bg-sky-900/60 border border-slate-700 hover:border-sky-500 rounded-xl transition-all btn-game group">
                            <i class="fa-solid fa-list-check text-3xl text-emerald-400 mb-3 group-hover:scale-110 transition-transform"></i>
                            <h3 class="font-bold text-white mb-1">Misi 1: Taktik</h3>
                            <p class="text-xs text-slate-400">20 Soal Pilihan Ganda Logika Pernika</p>
                        </button>

                        <button onclick="initGame('keyword')" class="flex flex-col items-center p-6 bg-slate-800 hover:bg-sky-900/60 border border-slate-700 hover:border-sky-500 rounded-xl transition-all btn-game group">
                            <i class="fa-solid fa-keyboard text-3xl text-purple-400 mb-3 group-hover:scale-110 transition-transform"></i>
                            <h3 class="font-bold text-white mb-1">Misi 2: Esai</h3>
                            <p class="text-xs text-slate-400">Susun Kata Kunci Istilah Teknis</p>
                        </button>

                        <button onclick="initGame('morse')" class="flex flex-col items-center p-6 bg-slate-800 hover:bg-sky-900/60 border border-slate-700 hover:border-sky-500 rounded-xl transition-all btn-game group">
                            <i class="fa-solid fa-tower-cell text-3xl text-amber-400 mb-3 group-hover:scale-110 transition-transform"></i>
                            <h3 class="font-bold text-white mb-1">Misi 3: Morse</h3>
                            <p class="text-xs text-slate-400">Latihan Telegraf Metode Substitusi</p>
                        </button>
                    </div>
                </div>
            `;
        }

        function buildQuizBank() {
            // Re-generate robust bank to ensure randomizer has pool
            let pool = rawDatabase.map(item => ({
                q: item[0], correct: item[1], wrongs: [item[2], item[3], item[4]], exp: item[5]
            }));
            // Duplicate pool to simulate large bank if needed, but randomly shuffling 
            // the ~30 unique high-quality ones gives enough variety for a 20-question run.
            let extendedPool = [...pool, ...pool, ...pool].sort(() => 0.5 - Math.random());
            // Filter unique
            let uniquePool = [];
            let seen = new Set();
            for(let p of extendedPool) {
                if(!seen.has(p.q)) { seen.add(p.q); uniquePool.push(p); }
            }
            return uniquePool.slice(0, 20); // Ambil 20 per sesi
        }

        function initGame(mode) {
            initAudio();
            state.mode = mode;
            state.score = 0;
            state.lives = 3;
            state.currentIndex = 0;
            statsHeader.classList.remove('hidden');
            updateStats();

            if(mode === 'quiz') {
                state.questions = buildQuizBank();
                renderQuiz();
            } else if(mode === 'keyword') {
                state.questions = [...targetWords].sort(() => 0.5 - Math.random()).slice(0, 5);
                renderKeywordQuiz();
            } else if(mode === 'morse') {
                state.questions = [...morseTargetWords].sort(() => 0.5 - Math.random()).slice(0, 5);
                startNextMorseWord();
            }
        }

        // --- MISI 1: QUIZ ---
        function renderQuiz() {
            if(state.lives <= 0) return;
            if (state.currentIndex >= state.questions.length) {
                endGame(true, "Luar biasa! Pemahaman teori Pernika Anda sudah sangat solid untuk UTS.");
                return;
            }

            const qData = state.questions[state.currentIndex];
            let choices = [qData.correct, ...qData.wrongs].sort(() => 0.5 - Math.random());
            let correctIndex = choices.indexOf(qData.correct);

            container.innerHTML = `
                <div class="w-full max-w-2xl fade-in">
                    <div class="mb-3 flex justify-between items-end">
                        <span class="text-emerald-400 font-bold uppercase tracking-wider text-sm"><i class="fa-solid fa-list-check mr-2"></i>Misi 1: Uji Taktik</span>
                        <span class="text-slate-400 text-sm font-mono font-bold">SOAL ${state.currentIndex + 1}/${state.questions.length}</span>
                    </div>
                    
                    <div class="w-full h-1.5 bg-slate-800 rounded-full mb-6 overflow-hidden flex items-center">
                        <div id="timer-bar-fill" class="h-full bg-emerald-400 timer-bar" style="width: 100%;"></div>
                    </div>

                    <div id="quiz-card" class="bg-slate-900 p-6 md:p-8 rounded-2xl border border-slate-700 shadow-xl transition-all relative">
                        <div id="time-text" class="absolute -top-3 -right-3 w-10 h-10 bg-slate-800 border-2 border-slate-700 text-white font-bold rounded-full flex items-center justify-center shadow-lg font-mono text-xs z-10"></div>
                        
                        <h3 class="text-lg md:text-xl font-semibold mb-8 leading-relaxed text-white">${qData.q}</h3>
                        
                        <div class="grid grid-cols-1 gap-3">
                            ${choices.map((choice, index) => `
                                <button onclick="handleQuizAnswer(${index}, ${correctIndex}, '${qData.exp.replace(/'/g, "\\'")}')" class="text-left w-full p-4 rounded-xl border border-slate-700 bg-slate-800/80 hover:bg-sky-900/50 hover:border-sky-500 transition-colors font-medium text-slate-300 hover:text-white flex items-center group">
                                    <div class="w-8 h-8 rounded-md bg-slate-950 flex items-center justify-center mr-3 font-bold text-sky-400 border border-slate-700 group-hover:border-sky-500">${String.fromCharCode(65 + index)}</div>
                                    <span class="flex-1">${choice}</span>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div id="explanation-box" class="hidden mt-6 bg-sky-950/50 p-5 rounded-xl border border-sky-900 text-sky-100 text-sm shadow-inner backdrop-blur-sm"></div>
                </div>
            `;

            startTimer(20, () => handleQuizAnswer(-1, correctIndex, qData.exp));
        }

        function handleQuizAnswer(selectedIndex, correctIndex, explanation) {
            clearInterval(state.timer);
            const quizCard = document.getElementById('quiz-card');
            const expBox = document.getElementById('explanation-box');
            
            const buttons = quizCard.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);

            if (selectedIndex === correctIndex) {
                playSuccess();
                state.score += 50;
                buttons[selectedIndex].classList.replace('bg-slate-800/80', 'bg-emerald-600');
                buttons[selectedIndex].classList.replace('border-slate-700', 'border-emerald-400');
                buttons[selectedIndex].classList.add('text-white');
            } else {
                playError();
                state.lives -= 1;
                quizCard.classList.add('shake');
                
                if (selectedIndex >= 0) {
                    buttons[selectedIndex].classList.replace('bg-slate-800/80', 'bg-red-600/80');
                    buttons[selectedIndex].classList.replace('border-slate-700', 'border-red-500');
                }
                buttons[correctIndex].classList.replace('bg-slate-800/80', 'bg-emerald-600/50');
                buttons[correctIndex].classList.replace('border-slate-700', 'border-emerald-500');
            }

            expBox.classList.remove('hidden');
            expBox.innerHTML = `<h4 class="font-bold text-sky-400 mb-1 flex items-center"><i class="fa-solid fa-microscope mr-2"></i> Kaji Ulang Taktis</h4><p class="leading-relaxed opacity-90">${explanation}</p>`;
            updateStats();

            if (state.lives > 0) {
                setTimeout(() => { state.currentIndex++; renderQuiz(); }, 4000);
            }
        }

        // --- MISI 2: KEYWORD (ANAGRAM) ---
        function renderKeywordQuiz() {
            if(state.lives <= 0) return;
            if (state.currentIndex >= state.questions.length) {
                endGame(true, "Analisis luar biasa! Memori otot tangan Anda sudah siap menghadapi soal esai dosen.");
                return;
            }

            state.currentPuzzle = state.questions[state.currentIndex];
            state.userAnswerObj = [];
            
            let letters = state.currentPuzzle.word.split('');
            let scrambled = letters.map((l, i) => ({ letter: l, id: i }));
            scrambled.sort(() => 0.5 - Math.random());
            while(scrambled.map(x=>x.letter).join('') === state.currentPuzzle.word && scrambled.length > 1) {
                scrambled.sort(() => 0.5 - Math.random());
            }
            state.scrambledLetters = scrambled;

            container.innerHTML = `
                <div class="w-full max-w-2xl fade-in flex flex-col items-center">
                    <div class="w-full mb-3 flex justify-between items-end">
                        <span class="text-purple-400 font-bold uppercase tracking-wider text-sm"><i class="fa-solid fa-keyboard mr-2"></i>Misi 2: Dekripsi Esai</span>
                        <span class="text-slate-400 text-sm font-mono font-bold">KATA ${state.currentIndex + 1}/${state.questions.length}</span>
                    </div>
                    <div class="w-full h-1.5 bg-slate-800 rounded-full mb-8 overflow-hidden flex items-center">
                        <div id="timer-bar-fill" class="h-full bg-purple-400 timer-bar" style="width: 100%;"></div>
                    </div>
                    <div class="bg-slate-900 p-8 rounded-2xl border border-slate-700 shadow-xl w-full text-center relative">
                        <i class="fa-solid fa-quote-left text-4xl text-slate-800 absolute top-4 left-4"></i>
                        <p class="text-lg md:text-xl text-slate-300 font-medium mb-10 leading-relaxed px-6 relative z-10">"${state.currentPuzzle.hint}"</p>
                        
                        <div id="answer-slots" class="flex flex-wrap justify-center gap-2 mb-8 min-h-[50px]">
                            ${state.currentPuzzle.word.split('').map(() => `<div class="w-10 h-12 md:w-12 md:h-14 rounded-lg border-2 border-slate-700 bg-slate-950 flex items-center justify-center text-xl md:text-2xl font-bold text-white shadow-inner"></div>`).join('')}
                        </div>

                        <div id="scrambled-letters" class="flex flex-wrap justify-center gap-2 md:gap-3">
                            ${state.scrambledLetters.map((obj, i) => `<button onclick="selectLetter(${i})" id="letter-btn-${i}" class="w-10 h-12 md:w-12 md:h-14 rounded-lg bg-slate-700 hover:bg-purple-600 border border-slate-600 flex items-center justify-center text-xl font-bold text-white shadow-lg btn-game">${obj.letter}</button>`).join('')}
                        </div>
                        
                        <div class="mt-8 flex justify-center gap-4">
                            <button onclick="resetWord()" class="px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 font-mono text-sm border border-slate-600 transition-colors"><i class="fa-solid fa-rotate-left mr-2"></i>Reset</button>
                        </div>
                    </div>
                </div>
            `;
            startTimer(30, () => checkKeywordAnswer(true));
        }

        function selectLetter(index) {
            playClick();
            const btn = document.getElementById(`letter-btn-${index}`);
            if(btn.style.visibility === 'hidden') return; 
            btn.style.visibility = 'hidden';
            state.userAnswerObj.push({ letter: state.scrambledLetters[index].letter, id: index });
            updateAnswerSlots();
        }

        function resetWord() {
            playClick();
            state.userAnswerObj = [];
            state.scrambledLetters.forEach((_, i) => { document.getElementById(`letter-btn-${i}`).style.visibility = 'visible'; });
            updateAnswerSlots();
        }

        function updateAnswerSlots() {
            const slots = document.getElementById('answer-slots').children;
            let currentWord = "";
            for(let i = 0; i < state.currentPuzzle.word.length; i++) {
                if(i < state.userAnswerObj.length) {
                    slots[i].innerText = state.userAnswerObj[i].letter;
                    slots[i].classList.replace('border-slate-700', 'border-purple-500');
                    slots[i].classList.replace('bg-slate-950', 'bg-purple-900/50');
                    currentWord += state.userAnswerObj[i].letter;
                } else {
                    slots[i].innerText = "";
                    slots[i].classList.replace('border-purple-500', 'border-slate-700');
                    slots[i].classList.replace('bg-purple-900/50', 'bg-slate-950');
                }
            }
            if(currentWord.length === state.currentPuzzle.word.length) checkKeywordAnswer(false, currentWord);
        }

        function checkKeywordAnswer(isTimeout, userWord = "") {
            clearInterval(state.timer);
            const isCorrect = userWord === state.currentPuzzle.word;
            const slots = document.getElementById('answer-slots').children;
            document.querySelectorAll('[id^="letter-btn-"]').forEach(b => b.disabled = true);

            if(isCorrect) {
                playSuccess();
                state.score += 150;
                for(let slot of slots) { slot.classList.replace('border-purple-500', 'border-emerald-400'); slot.classList.replace('bg-purple-900/50', 'bg-emerald-600'); }
            } else {
                playError();
                state.lives -= 1;
                document.getElementById('answer-slots').parentElement.classList.add('shake');
                for(let i=0; i<slots.length; i++) {
                    slots[i].innerText = state.currentPuzzle.word[i];
                    slots[i].className = "w-10 h-12 md:w-12 md:h-14 rounded-lg border-2 border-red-500 bg-red-900/80 flex items-center justify-center text-xl font-bold text-white";
                }
            }
            updateStats();
            if (state.lives > 0) setTimeout(() => { state.currentIndex++; renderKeywordQuiz(); }, 2500);
        }

        // --- MISI 3: MORSE ---
        function startNextMorseWord() {
            if(state.lives <= 0) return;
            if (state.currentIndex >= state.questions.length) {
                endGame(true, "Misi Sandi Berhasil! Anda sudah hafal kode Morse di luar kepala.");
                return;
            }
            state.currentMorseWord = state.questions[state.currentIndex];
            state.currentMorseCharIndex = 0;
            state.currentMorseInput = "";
            renderMorseBoard();
        }

        function renderMorseBoard() {
            if(state.lives <= 0) return;
            container.innerHTML = `
                <div class="w-full max-w-md flex flex-col items-center fade-in">
                    <div class="w-full mb-3 flex justify-between items-end">
                        <span class="text-amber-400 font-bold uppercase tracking-wider text-sm"><i class="fa-solid fa-tower-cell mr-2"></i>Misi 3: Telegraf</span>
                        <span class="text-slate-400 text-sm font-mono font-bold">KATA ${state.currentIndex + 1}/${state.questions.length}</span>
                    </div>

                    <div class="w-full h-1.5 bg-slate-800 rounded-full mb-6 overflow-hidden flex items-center">
                        <div id="timer-bar-fill" class="h-full bg-amber-400 timer-bar" style="width: 100%;"></div>
                    </div>

                    <div class="w-full bg-slate-900 rounded-2xl p-6 border border-slate-700 shadow-xl mb-6 relative">
                        <div class="text-center mb-3 text-slate-500 font-mono text-xs font-bold tracking-widest">CIPHERTEXT (KIRIM VIA MORSE):</div>
                        <div class="flex justify-center space-x-3 text-4xl font-black tracking-widest mb-6 font-mono">
                            ${state.currentMorseWord.split('').map((c, i) => `<span class="${i === state.currentMorseCharIndex ? 'text-amber-400 border-b-4 border-amber-400 pb-1 scale-110 drop-shadow-[0_0_8px_rgba(251,191,36,0.8)]' : (i < state.currentMorseCharIndex ? 'text-emerald-600 opacity-50' : 'text-slate-300')}">${c}</span>`).join('')}
                        </div>
                        
                        <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 h-28 flex flex-col justify-center items-center shadow-inner relative overflow-hidden">
                            <div class="text-[10px] text-slate-600 absolute top-2 left-3 font-mono">SINYAL INPUT:</div>
                            <div id="morse-input-display" class="text-5xl morse-font text-white tracking-[0.2em] font-bold h-12 flex items-center justify-center"></div>
                        </div>

                        <div id="hint-box" class="mt-5 text-center text-sm font-mono font-bold h-8 transition-all flex justify-center items-center opacity-0"></div>
                    </div>

                    <div class="flex w-full space-x-4">
                        <button id="btn-dot" onclick="handleMorseInput('.')" class="flex-1 bg-slate-800 hover:bg-slate-700 active:bg-amber-600 text-white rounded-2xl h-36 border-b-[6px] border-slate-950 active:border-b-0 active:translate-y-[6px] transition-all flex flex-col items-center justify-center shadow-lg relative group">
                            <span class="text-6xl font-black mb-1 leading-none text-slate-200">.</span>
                            <span class="text-[10px] font-mono text-amber-500/70 uppercase tracking-widest mt-2">Titik / A,I,U,E</span>
                            <span class="absolute bottom-2 text-[9px] text-slate-600 hidden md:block">Panah Kiri</span>
                        </button>
                        <button id="btn-dash" onclick="handleMorseInput('-')" class="flex-1 bg-slate-800 hover:bg-slate-700 active:bg-amber-600 text-white rounded-2xl h-36 border-b-[6px] border-slate-950 active:border-b-0 active:translate-y-[6px] transition-all flex flex-col items-center justify-center shadow-lg relative group">
                            <span class="text-6xl font-black mb-1 leading-none text-slate-200">-</span>
                            <span class="text-[10px] font-mono text-amber-500/70 uppercase tracking-widest mt-2">Garis / Vokal O</span>
                            <span class="absolute bottom-2 text-[9px] text-slate-600 hidden md:block">Panah Kanan</span>
                        </button>
                    </div>
                </div>
            `;
            document.onkeydown = handleKeyPress;
            startTimer(8, () => handleMorseFail()); // 8 detik per huruf
        }

        function handleKeyPress(e) {
            if(state.lives <= 0) return;
            if (e.key === 'ArrowLeft' || e.key === '.') {
                const btn = document.getElementById('btn-dot');
                if(btn) { btn.classList.add('bg-amber-600', 'translate-y-[6px]', 'border-b-0'); handleMorseInput('.'); setTimeout(() => btn.classList.remove('bg-amber-600', 'translate-y-[6px]', 'border-b-0'), 100); }
            } else if (e.key === 'ArrowRight' || e.key === '-') {
                const btn = document.getElementById('btn-dash');
                if(btn) { btn.classList.add('bg-amber-600', 'translate-y-[6px]', 'border-b-0'); handleMorseInput('-'); setTimeout(() => btn.classList.remove('bg-amber-600', 'translate-y-[6px]', 'border-b-0'), 100); }
            }
        }

        function handleMorseInput(char) {
            if(state.lives <= 0) return;
            if (char === '.') playDot(); else playDash();

            state.currentMorseInput += char;
            const display = document.getElementById('morse-input-display');
            if(display) display.innerText = state.currentMorseInput;

            const targetChar = state.currentMorseWord[state.currentMorseCharIndex];
            const targetMorse = morseDictionary[targetChar].morse;

            if (targetMorse === state.currentMorseInput) {
                clearInterval(state.timer);
                document.onkeydown = null; 
                playSuccess();
                state.score += 50;
                updateStats();
                if(display) display.classList.replace('text-white', 'text-amber-400');
                
                setTimeout(() => {
                    state.currentMorseInput = "";
                    state.currentMorseCharIndex++;
                    if (state.currentMorseCharIndex >= state.currentMorseWord.length) {
                        state.currentIndex++; startNextMorseWord();
                    } else { renderMorseBoard(); }
                }, 400);

            } else if (!targetMorse.startsWith(state.currentMorseInput)) {
                handleMorseFail();
            }
        }

        function handleMorseFail() {
            clearInterval(state.timer);
            document.onkeydown = null;
            playError();
            state.lives -= 1;
            
            if (state.lives <= 0) { updateStats(); return; }
            updateStats();

            const display = document.getElementById('morse-input-display');
            if (display) {
                display.classList.replace('text-white', 'text-red-500');
                display.parentElement.parentElement.classList.add('shake');
            }
            
            const targetChar = state.currentMorseWord[state.currentMorseCharIndex];
            const dictData = morseDictionary[targetChar];
            const hintBox = document.getElementById('hint-box');
            
            if (hintBox) {
                hintBox.innerHTML = `<span class="text-slate-400 mr-2">HINT:</span> <span class="bg-amber-500/20 text-amber-300 border border-amber-500/50 px-3 py-1 rounded tracking-widest shadow-sm">${dictData.word}</span> <i class="fa-solid fa-arrow-right mx-2 text-slate-600"></i><span class="text-white text-lg tracking-[0.2em] font-bold">${dictData.morse}</span>`;
                hintBox.classList.remove('opacity-0'); hintBox.classList.add('opacity-100');
            }

            setTimeout(() => { if (state.lives > 0) { state.currentMorseInput = ""; renderMorseBoard(); } }, 3000);
        }

        function endGame(isWin, winMsg = "") {
            clearInterval(state.timer);
            document.onkeydown = null;
            statsHeader.classList.add('hidden');

            const title = isWin ? "OPERASI BERHASIL" : "OPERASI GAGAL";
            const titleColor = isWin ? "text-emerald-400" : "text-red-500";
            const iconColor = isWin ? "text-emerald-500 drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]" : "text-red-600 drop-shadow-[0_0_15px_rgba(220,38,38,0.5)]";
            const icon = isWin ? "fa-shield-check" : "fa-triangle-exclamation";
            let message = isWin ? winMsg : "Pemahaman Anda hancur karena tekanan waktu. Coba simulasi ulang untuk melatih mental Anda!";

            container.innerHTML = `
                <div class="text-center w-full max-w-md bg-slate-900/90 p-8 rounded-2xl border border-slate-700 shadow-2xl backdrop-blur-sm fade-in">
                    <div class="text-7xl mb-6 ${iconColor}"><i class="fa-solid ${icon}"></i></div>
                    <h2 class="text-3xl font-black mb-3 ${titleColor} tracking-tight">${title}</h2>
                    <p class="text-slate-300 mb-8 leading-relaxed">${message}</p>
                    <div class="bg-slate-950 p-5 rounded-xl border border-slate-800 mb-8 shadow-inner relative overflow-hidden">
                        <div class="absolute -right-4 -bottom-4 text-6xl text-slate-800/30 opacity-50"><i class="fa-solid fa-star"></i></div>
                        <div class="text-xs text-slate-500 font-mono font-bold mb-1 tracking-widest">SKOR AKHIR</div>
                        <div class="text-5xl font-black text-white font-mono">${state.score}</div>
                    </div>
                    <button onclick="renderMenu()" class="w-full py-4 bg-sky-600 hover:bg-sky-500 text-white font-bold rounded-xl text-lg shadow-[0_0_15px_rgba(2,132,199,0.4)] transition-all btn-game flex items-center justify-center">
                        <i class="fa-solid fa-satellite-dish mr-2"></i> KEMBALI KE PANGKALAN
                    </button>
                </div>
            `;
        }

        renderMenu();
    </script>
</body>
</html>
