        radial-gradient(circle at 62% 24%, rgba(52, 211, 153, 0.34) 0 2px, transparent 3px);
    }

    .floating-orb {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 999px;
      filter: blur(70px);
      opacity: 0.18;
      z-index: -1;
      animation: float 10s ease-in-out infinite alternate;

    .orb-a { left: -160px; top: 12%; background: #38bdf8; }
    .orb-b { right: -170px; bottom: 8%; background: #a855f7; animation-delay: -3s; }

    @keyframes float {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(34px, -28px, 0) scale(1.08); }
    }

    .glass {

      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.35);
    }

    .btn-game:active:not(:disabled) { transform: scale(0.97); }
    .btn-game:disabled { cursor: default; }

    .fade-in { animation: fadeIn 0.3s ease both; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .gradient-text {
      background: linear-gradient(90deg, #38bdf8, #a855f7, #34d399);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

      border-color: #34d399 !important;
      background: rgba(52, 211, 153, 0.15) !important;
      color: white !important;
    }

      border-color: #fb7185 !important;
      background: rgba(251, 113, 133, 0.15) !important;
      color: white !important;
    }

    .opt-dim { opacity: 0.5; }

    label,

    let privacyTimer = null;

    function showPrivacyGuard(message = "Aksi salin, cetak, atau tangkapan layar dibatasi selama latihan berlangsung.", duration = 1600) {
      if (!privacyGuard) return;

      if (privacyMessage) {
        privacyMessage.innerText = message;
      }

      document.body.classList.add("privacy-blur");
      privacyGuard.classList.add("show");
      privacyGuard.setAttribute("aria-hidden", "false");

      clearTimeout(privacyTimer);
      privacyTimer = setTimeout(() => {
        privacyGuard.classList.remove("show");
        privacyGuard.setAttribute("aria-hidden", "true");
        document.body.classList.remove("privacy-blur");
      }, duration);
    }

    function blockProtectedAction(event, message) {
      event.preventDefault();
      event.stopPropagation();
      showPrivacyGuard(message);
      return false;
    }

    ["copy", "cut", "paste", "dragstart", "selectstart"].forEach((eventName) => {
      document.addEventListener(eventName, (event) => {
        if (event.target && event.target.id === "player-name" && eventName !== "copy" && eventName !== "cut") {
          return;
        }

        blockProtectedAction(event, "Konten latihan tidak bisa disalin selama sesi berlangsung.");
      }, { capture: true });
    });

    document.addEventListener("contextmenu", (event) => {
      blockProtectedAction(event, "Klik kanan dinonaktifkan untuk menjaga integritas latihan.");
    }, { capture: true });

    document.addEventListener("keydown", (event) => {
      const key = String(event.key || "").toLowerCase();
      const ctrlOrMeta = event.ctrlKey || event.metaKey;

      const blockedShortcut =
        (ctrlOrMeta && ["c", "x", "s", "p", "u", "a"].includes(key)) ||
        (ctrlOrMeta && event.shiftKey && ["i", "j", "c"].includes(key)) ||
        key === "printscreen" ||
        key === "f12";

      if (blockedShortcut) {
        blockProtectedAction(event, "Shortcut salin, cetak, inspect, atau screenshot dibatasi.");
      }
    }, { capture: true });

    document.addEventListener("keyup", (event) => {
      if (String(event.key || "").toLowerCase() === "printscreen") {
        showPrivacyGuard("Tombol screenshot terdeteksi. Konten dikunci sementara.", 2200);
      }
    }, { capture: true });

    window.addEventListener("blur", () => {
      showPrivacyGuard("Halaman kehilangan fokus. Konten dikunci sementara.", 1200);
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        showPrivacyGuard("Konten dikunci saat halaman tidak aktif.", 1800);
      }
    });

    window.addEventListener("beforeprint", (event) => {
      showPrivacyGuard("Cetak halaman dinonaktifkan untuk latihan ini.", 2200);
      event.preventDefault();
    });

    let state = {
      playerName: "",
      score: 0,
      currentIndex: 0,
      shuffledData: []
    };

    function shuffleArray(arr) {
      const copy = [...arr];

      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }

      return copy;
    }

    async function getLeaderboard() {
      const { data, error } = await supabaseClient
        .from("practice_scores")
        .select("*")
        .eq("practice_id", PRACTICE_ID)
        .order("score", { ascending: false })
        .order("created_at", { ascending: true })
        .limit(50);

      if (error) {
        console.error("Gagal mengambil leaderboard:", error.message);
        return [];
      }

      return data || [];
    }

    async function saveLeaderboardEntry({ name, score, maxScore }) {
      const payload = {
        practice_id: PRACTICE_ID,
        player_name: name.trim(),
        score,
        max_score: maxScore,
        percentage: Math.round((score / maxScore) * 100)
      };

      const { data: inserted, error: insertError } = await supabaseClient
        .from("practice_scores")
        .insert(payload)
        .select("*")
        .single();

      if (insertError) {
        console.error("Gagal menyimpan skor:", insertError.message);

        return {
          entry: null,
          leaderboard: await getLeaderboard()
        };
      }

      const leaderboard = await getLeaderboard();

      return {
        entry: inserted,
        leaderboard
      };
    }

    async function clearLeaderboard() {
      alert("Reset leaderboard global tidak dibuka untuk user. Hapus data lewat Supabase Dashboard jika diperlukan.");
    }

    function formatDateTime(value) {
      try {
        return new Date(value).toLocaleString("id-ID", {
          day: "2-digit",
          month: "short",
          hour: "2-digit",
          minute: "2-digit"
        });
      } catch {
        return "-";
      }
    }

    function getMedal(rank) {
      if (rank === 1) return "🥇";
      if (rank === 2) return "🥈";
      if (rank === 3) return "🥉";
      return "#" + rank;
    }

    function getPodiumOrder(topThree) {
      return [topThree[1], topThree[0], topThree[2]].filter(Boolean);
    }

    function getPodiumClass(rank) {
      if (rank === 1) {
        return {
          height: "md:h-56",
          border: "border-amber-300/40",
          bg: "bg-amber-400/10",
          text: "text-amber-200",
          score: "text-amber-300",
          icon: "bg-amber-400/15"
        };
      }

      if (rank === 2) {
        return {
          height: "md:h-48",
          border: "border-slate-300/30",
          bg: "bg-slate-300/10",
          text: "text-slate-200",
          score: "text-slate-200",
          icon: "bg-slate-300/10"
        };
      }

      return {
        height: "md:h-40",
        border: "border-orange-300/30",
        bg: "bg-orange-400/10",
        text: "text-orange-200",
        score: "text-orange-300",
        icon: "bg-orange-400/10"
      };
    }

    function renderMiniLeaderboard(leaderboard) {
      if (!leaderboard.length) {
        return `
          <div class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4 text-sm leading-6 text-slate-400">
            Belum ada skor. Selesaikan latihan pertama untuk membuat ranking.
          </div>
        `;
      }

      return leaderboard.slice(0, 5).map((item, index) => `
        <div class="mb-2 flex items-center justify-between gap-3 rounded-2xl border border-slate-800 bg-slate-900/70 px-3 py-2">
          <div class="flex min-w-0 items-center gap-3">
            <div class="grid h-8 w-8 shrink-0 place-items-center rounded-xl bg-slate-950 text-sm font-black text-cyan-300">
              ${getMedal(index + 1)}
            </div>

            <div class="min-w-0">
              <p class="truncate text-sm font-bold text-white">
                ${item.player_name}
              </p>

              <p class="text-[11px] text-slate-500">
                ${formatDateTime(item.created_at)}
              </p>
            </div>
          </div>

          <p class="mono text-sm font-black text-cyan-300">
            ${item.score}
          </p>
        </div>
      `).join("");
    }

    function renderLeaderboard(leaderboard, currentEntryId) {
      if (!leaderboard.length) {
        return `
          <div class="rounded-3xl border border-slate-800 bg-slate-950/70 p-5 text-center text-sm text-slate-400">
            Belum ada ranking.
          </div>
        `;
      }

      const topThree = leaderboard.slice(0, 3);
      const rest = leaderboard.slice(3);
      const podiumOrder = getPodiumOrder(topThree);

      return `
        <div class="w-full">
          <div class="mb-5 flex flex-wrap items-center justify-between gap-3">
            <div>
              <p class="mono text-[10px] font-black uppercase tracking-[0.26em] text-slate-500">
                Global Leaderboard
              </p>

              <h3 class="mt-1 text-xl font-black text-white">
                Ranking Latihan Machine Learning
              </h3>
            </div>
          </div>

          <div class="mb-5 grid items-end gap-3 md:grid-cols-3">
            ${podiumOrder.map((item) => {
              const rank = leaderboard.findIndex((entry) => entry.id === item.id) + 1;
              const style = getPodiumClass(rank);
              const isCurrent = item.id === currentEntryId;

              return `
                <div class="flex ${style.height} flex-col justify-between rounded-[1.5rem] border ${style.border} ${style.bg} p-4 text-center ${isCurrent ? "ring-4 ring-cyan-400/20" : ""}">
                  <div>
                    <div class="mx-auto mb-3 grid h-14 w-14 place-items-center rounded-2xl ${style.icon} text-3xl">
                      ${getMedal(rank)}
                    </div>

                    <p class="mono text-xs font-black uppercase tracking-widest ${style.text}">
                      Rank ${rank}
                    </p>

                    <p class="mt-2 truncate text-lg font-black text-white">
                      ${item.player_name}
                    </p>
                  </div>

                  <div>
                    <p class="mono text-4xl font-black ${style.score}">
                      ${item.score}
                    </p>

                    <p class="text-xs font-semibold text-slate-400">
                      ${item.percentage}% • ${formatDateTime(item.created_at)}
                    </p>
                  </div>
                </div>
              `;
            }).join("")}
          </div>

          ${
            rest.length > 0
              ? `
                <div class="space-y-2">
                  ${rest.map((item, index) => {
                    const rank = index + 4;
                    const isCurrent = item.id === currentEntryId;

                    return `
                      <div class="flex items-center justify-between gap-3 rounded-2xl border ${
                        isCurrent
                          ? "border-cyan-400/40 bg-cyan-400/10"
                          : "border-slate-800 bg-slate-950/60"
                      } px-4 py-3">
                        <div class="flex min-w-0 items-center gap-3">
                          <div class="mono grid h-10 w-10 shrink-0 place-items-center rounded-xl bg-slate-900 font-black text-slate-300">
                            #${rank}
                          </div>

                          <div class="min-w-0">
                            <p class="truncate font-bold text-white">
                              ${item.player_name}
                            </p>

                            <p class="text-xs text-slate-500">
                              ${formatDateTime(item.created_at)}
                            </p>
                          </div>
                        </div>

                        <div class="text-right">
                          <p class="mono text-xl font-black text-cyan-300">
                            ${item.score}
                          </p>

                          <p class="text-xs text-slate-500">
                            ${item.percentage}%
                          </p>
                        </div>
                      </div>
                    `;
                  }).join("")}
                </div>
              `
              : `
                <div class="rounded-2xl border border-slate-800 bg-slate-950/60 p-4 text-center text-sm text-slate-500">
                  Belum ada peserta di rank 4 dan seterusnya.
                </div>
              `
          }
        </div>
      `;
    }

    async function renderMenu() {
      statsHeader.classList.add("hidden");

      const leaderboard = await getLeaderboard();

      container.innerHTML = `
        <section class="fade-in w-full max-w-5xl">
          <div class="glass relative overflow-hidden rounded-[2rem] p-8 md:p-12">
            <div class="absolute right-0 top-0 h-40 w-40 rounded-full bg-cyan-400/10 blur-3xl"></div>
            <div class="absolute bottom-0 left-0 h-44 w-44 rounded-full bg-violet-500/10 blur-3xl"></div>

            <div class="relative grid gap-8 lg:grid-cols-[1fr_380px] lg:items-start">
              <div>
                <div class="mx-auto mb-6 grid h-20 w-20 place-items-center rounded-3xl bg-cyan-400/10 text-cyan-300 border border-cyan-400/20 lg:mx-0">
                  <i class="fa-solid fa-microscope text-4xl"></i>
                </div>

                <h2 class="text-3xl font-black tracking-tight text-white md:text-5xl mb-4">
                  Ujian Teori <span class="gradient-text">Machine Learning</span>
                </h2>

                <p class="max-w-xl text-sm md:text-base leading-7 text-slate-300 mb-6">
                  Sistem akan merotasi 10 soal acak dari bank soal Machine Learning.
                  Setelah selesai, skor kamu akan masuk ke leaderboard global dan bisa dilihat semua pengguna.
                  <br><br>
                  <b>Perhatikan distraktor:</b> opsi jawaban dibuat lebih seimbang, jadi tidak bisa ditebak hanya dari panjang jawaban.
                </p>

                <label class="block max-w-md text-left">
                  <span class="mb-2 block text-sm font-bold text-slate-200">
                    Nama Peserta
                  </span>

                  <input
                    id="player-name"
                    type="text"
                    maxlength="40"
                    class="w-full rounded-2xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-sm font-semibold text-white outline-none transition focus:border-cyan-400 focus:ring-4 focus:ring-cyan-400/10"
                  />
                </label>

                <button
                  onclick="initGame()"
                  class="btn-game mt-5 inline-flex items-center gap-3 rounded-2xl bg-cyan-600 hover:bg-cyan-500 px-8 py-4 font-black text-white shadow-lg shadow-cyan-900/40 text-lg"
                >
                  <i class="fa-solid fa-play"></i>
                  Mulai Kuis Teori
                </button>
              </div>

              <div class="rounded-[1.75rem] border border-slate-800 bg-slate-950/60 p-5">
                <div class="mb-4 flex items-center justify-between gap-3">
                  <div>
                    <p class="mono text-[10px] font-black uppercase tracking-[0.24em] text-slate-500">
                      Global Rank
                    </p>

                    <h3 class="mt-1 font-black text-white">
                      Leaderboard Terakhir
                    </h3>
                  </div>

                  <div class="grid h-10 w-10 place-items-center rounded-2xl bg-cyan-400/10 text-cyan-300">
                    <i class="fa-solid fa-ranking-star"></i>
                  </div>
                </div>

                ${renderMiniLeaderboard(leaderboard)}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function initGame() {
      const nameInput = document.getElementById("player-name");
      const playerName = nameInput && nameInput.value ? nameInput.value.trim() : "";

      if (!playerName) {
        alert("Isi nama peserta dulu supaya skor bisa masuk leaderboard.");
        if (nameInput) nameInput.focus();
        return;
      }

      state.playerName = playerName;
      state.score = 0;
      state.currentIndex = 0;
      scoreDisplay.innerText = "0";

      const tempQuestions = shuffleArray(quizData).slice(0, 10);

      state.shuffledData = tempQuestions.map((q) => {
        let opts = q.options.map((opt, idx) => ({
          text: opt,
          isCorrect: idx === q.correctIndex
        }));

        opts = shuffleArray(opts);

        return {
          question: q.question,
          options: opts,
          explanation: q.explanation
        };
      });

      statsHeader.classList.remove("hidden");
      renderQuestion();
    }

    function renderQuestion() {
      if (state.currentIndex >= state.shuffledData.length) {
        endGame();
        return;
      }

      const q = state.shuffledData[state.currentIndex];

      container.innerHTML = `
        <section class="fade-in w-full max-w-3xl">
          <div class="mb-4 flex items-end justify-between">
            <p class="text-xs font-black uppercase tracking-[0.24em] text-cyan-300">
              <i class="fa-solid fa-book-open mr-2"></i> Kuis Konseptual
            </p>

            <div class="mono rounded-full border border-slate-700 bg-slate-900/70 px-4 py-1 text-xs font-bold text-slate-300">
              Soal ${state.currentIndex + 1} dari ${state.shuffledData.length}
            </div>
          </div>

          <div class="glass rounded-[1.75rem] p-6 md:p-8 mb-6 relative">
            <h3 class="text-lg md:text-xl font-semibold leading-relaxed text-white mb-6">
              ${q.question}
            </h3>

            <div class="grid gap-3" id="options-container">
              ${q.options.map((opt, i) => `
                <button
                  id="opt-${i}"
                  onclick="handleAnswer(${i})"
                  class="btn-game w-full flex items-start gap-4 rounded-2xl border border-slate-700 bg-slate-900/50 p-4 text-left text-slate-300 hover:bg-slate-800 transition-colors"
                >
                  <span class="mono grid h-8 w-8 shrink-0 place-items-center rounded-lg border border-slate-700 bg-slate-950 font-black text-cyan-400">
                    ${String.fromCharCode(65 + i)}
                  </span>

                  <span class="text-sm leading-6 md:text-base mt-0.5">
                    ${opt.text}
                  </span>
                </button>
              `).join("")}
            </div>
          </div>

          <div id="explanation-box" class="hidden fade-in glass rounded-[1.5rem] p-6 mb-6 border-l-4 border-l-cyan-400 bg-cyan-950/20">
            <p class="text-sm md:text-base leading-7 text-slate-200">
              ${q.explanation}
            </p>
          </div>

          <div class="flex justify-end">
            <button id="next-btn" onclick="nextQuestion()" class="hidden fade-in btn-game rounded-xl bg-white text-slate-900 px-8 py-3 font-bold shadow-lg hover:bg-slate-200">
              Lanjut ke Soal Berikutnya <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>
          </div>
        </section>
      `;
    }

    function handleAnswer(selectedIndex) {
      const q = state.shuffledData[state.currentIndex];
      const isCorrect = q.options[selectedIndex].isCorrect;

      const containerDiv = document.getElementById("options-container");
      const buttons = containerDiv.querySelectorAll("button");

      buttons.forEach((btn) => {
        btn.disabled = true;
      });

      if (isCorrect) {
        state.score += 10;
        scoreDisplay.innerText = state.score;
      }

      q.options.forEach((opt, idx) => {
        const btn = document.getElementById("opt-" + idx);

        if (opt.isCorrect) {
          btn.classList.add("opt-correct");
        } else if (idx === selectedIndex && !isCorrect) {
          btn.classList.add("opt-wrong");
        } else {
          btn.classList.add("opt-dim");
        }
      });

      document.getElementById("explanation-box").classList.remove("hidden");
      document.getElementById("next-btn").classList.remove("hidden");
    }

    function nextQuestion() {
      state.currentIndex += 1;
      renderQuestion();
    }

    async function endGame() {
      statsHeader.classList.add("hidden");

      const maxScore = state.shuffledData.length * 10;

      const result = await saveLeaderboardEntry({
        name: state.playerName,
        score: state.score,
        maxScore
      });

      const entry = result.entry;
      const leaderboard = result.leaderboard;

      let finalMessage = "Evaluasi selesai. Seluruh jebakan konseptual dari materi telah dibongkar.";

      if (state.score < 50) {
        finalMessage = "Banyak konsep yang masih keliru akibat jebakan opsi. Kaji ulang pembahasan dan coba lagi.";
      } else if (state.score >= 80) {
        finalMessage = "Penguasaan teori analitik kamu sangat tajam. Kamu tidak mudah terkecoh oleh opsi yang tampak ilmiah.";
      }

      container.innerHTML = `
        <section class="fade-in w-full max-w-6xl">
          <div class="glass overflow-hidden rounded-[2rem] p-6 md:p-8">
            <div class="grid gap-7 lg:grid-cols-[0.78fr_1.22fr] lg:items-start">
              <div class="text-center lg:text-left">
                <div class="mx-auto mb-6 grid h-24 w-24 place-items-center rounded-full bg-emerald-400/10 text-emerald-400 border border-emerald-400/30 lg:mx-0">
                  <i class="fa-solid fa-flag-checkered text-5xl"></i>
                </div>

                <h2 class="text-3xl font-black text-white mb-2">
                  Sesi Latihan Selesai!
                </h2>

                <p class="text-sm leading-7 text-slate-300 mb-6">
                  ${finalMessage}
                </p>

                <div class="rounded-3xl border border-slate-800 bg-slate-950/80 p-5 shadow-inner mb-4">
                  <p class="mono text-[10px] font-black uppercase tracking-[0.28em] text-slate-500 mb-2">
                    Skor ${state.playerName}
                  </p>

                  <p class="mono text-6xl font-black text-cyan-400">
                    ${state.score}<span class="text-2xl text-slate-600">/${maxScore}</span>
                  </p>
                </div>

                <button
                  onclick="renderMenu()"
                  class="btn-game w-full rounded-2xl bg-slate-800 hover:bg-slate-700 border border-slate-600 px-5 py-4 font-black text-white shadow-lg"
                >
                  <i class="fa-solid fa-rotate-left mr-2"></i>
                  Simulasi Baru
                </button>
              </div>

              <div>
                ${renderLeaderboard(leaderboard, entry ? entry.id : null)}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    renderMenu();
  </script>
</body>
</html>
