<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Latihan Machine Learning - ClassHub</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />

  <style>
    :root {
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.82);
      --panel-solid: #0f172a;
      --line: rgba(148, 163, 184, 0.18);
      --cyan: #38bdf8;
      --violet: #a855f7;
      --emerald: #34d399;
      --amber: #fbbf24;
      --rose: #fb7185;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(168, 85, 247, 0.18), transparent 36%),
        radial-gradient(circle at bottom, rgba(16, 185, 129, 0.12), transparent 34%),
        var(--bg);
      color: #f8fafc;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
      touch-action: manipulation;
      user-select: none;
    }

    body {
      min-height: 100vh;
    }

    .mono {
      font-family: "JetBrains Mono", monospace;
    }

    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -3;
      background-image:
        linear-gradient(rgba(56, 189, 248, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168, 85, 247, 0.045) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent 90%);
      pointer-events: none;
    }

    .neural-bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: 0.55;
      background:
        radial-gradient(circle at 16% 18%, rgba(56, 189, 248, 0.34) 0 2px, transparent 3px),
        radial-gradient(circle at 30% 38%, rgba(168, 85, 247, 0.32) 0 2px, transparent 3px),
        radial-gradient(circle at 62% 24%, rgba(52, 211, 153, 0.34) 0 2px, transparent 3px),
        radial-gradient(circle at 78% 50%, rgba(56, 189, 248, 0.28) 0 2px, transparent 3px),
        radial-gradient(circle at 50% 74%, rgba(168, 85, 247, 0.28) 0 2px, transparent 3px);
    }

    .floating-orb {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 999px;
      filter: blur(70px);
      opacity: 0.18;
      z-index: -1;
      animation: float 10s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .orb-a {
      left: -160px;
      top: 12%;
      background: #38bdf8;
    }

    .orb-b {
      right: -170px;
      bottom: 8%;
      background: #a855f7;
      animation-delay: -3s;
    }

    @keyframes float {
      from {
        transform: translate3d(0, 0, 0) scale(1);
      }
      to {
        transform: translate3d(34px, -28px, 0) scale(1.08);
      }
    }

    .glass {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow:
        0 22px 60px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(18px);
    }

    .btn-game {
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    }

    .btn-game:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.35);
    }

    .btn-game:active:not(:disabled) {
      transform: scale(0.97);
    }

    .btn-game:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .metric-pill {
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    .timer-bar {
      transition: width 0.1s linear, background-color 0.3s;
    }

    .shake {
      animation: shake 0.36s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    .fade-in {
      animation: fadeIn 0.25s ease both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .gradient-text {
      background: linear-gradient(90deg, #38bdf8, #a855f7, #34d399);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .code-card {
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(2, 6, 23, 0.98));
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #020617;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
  </style>
</head>

    const state = {

    const container = document.getElementById("app-container");

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function playTone(duration, frequency = 600, type = "sine") {
      initAudio();

      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.type = type;
      oscillator.frequency.value = frequency;
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.start();
      gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration / 1000);
      oscillator.stop(audioCtx.currentTime + duration / 1000);
    }

    function playZero() {
      playTone(100, 860, "square");
    }

    function playOne() {
      playTone(260, 430, "square");
    }

    function playError() {
      playTone(260, 160, "sawtooth");
    }

    function playSuccess() {
      playTone(360, 920, "triangle");
    }

    function playClick() {
      playTone(50, 1200, "sine");
    }

    function shuffleArray(arr) {
      const copy = [...arr];

      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }

      return copy;
    }

    function escapeForAttribute(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function updateStats() {
      document.getElementById("lives-display").innerText = state.lives;
      document.getElementById("score-display").innerText = state.score;

      if (state.lives <= 0 && state.mode !== "menu" && state.mode !== "result") {
        endGame(false);
      }
    }

    function startTimer(seconds, onTimeout) {
      clearInterval(state.timer);

      state.maxTime = seconds;
      state.timeLeft = seconds;

      const bar = document.getElementById("timer-bar-fill");
      const timeText = document.getElementById("time-text");

      state.timer = setInterval(() => {
        state.timeLeft -= 0.1;

        const percentage = Math.max((state.timeLeft / state.maxTime) * 100, 0);

        if (bar) {
          bar.style.width = percentage + "%";

          if (percentage < 25) {
            bar.style.backgroundColor = "#fb7185";
          } else if (percentage < 50) {
            bar.style.backgroundColor = "#fbbf24";
          } else if (state.mode === "keyword") {
            bar.style.backgroundColor = "#a855f7";
          } else if (state.mode === "binary") {
            bar.style.backgroundColor = "#38bdf8";
          } else {
            bar.style.backgroundColor = "#34d399";
          }
        }

        if (timeText) {
          timeText.innerText = Math.ceil(state.timeLeft) + "s";
        }

        if (state.timeLeft <= 0) {
          clearInterval(state.timer);
          onTimeout();
        }
      }, 100);
    }

                  </div>
                  <h3 class="font-black text-white">Binary Stream</h3>
                  <p class="mt-2 text-xs leading-5 text-slate-400">
                    Kirim token ML sebagai sinyal biner 0 dan 1 dengan batas waktu.
                  </p>
                </button>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function initGame(mode) {
      initAudio();

      state.mode = mode;
      state.score = 0;
      state.lives = 3;
      state.currentIndex = 0;

      statsHeader.classList.remove("hidden");
      updateStats();
      document.addEventListener("keydown", handleGlobalKeydown);

      if (mode === "quiz") {
        state.questions = shuffleArray(rawDatabase).slice(0, 5);
        renderQuiz();
      }

      if (mode === "keyword") {
        state.questions = shuffleArray(anagramWords).slice(0, 5);
        renderKeywordQuiz();
      }

      if (mode === "binary") {
        state.questions = shuffleArray(binaryWords).slice(0, 5);
        startNextBinaryWord();
      }
    }

    function handleGlobalKeydown(e) {
      if (state.lives <= 0) return;

      if (state.mode === "keyword") {
        if (e.key === "Backspace" || e.key === "Escape") {
          resetWord();
          return;
        }

        const key = e.key.toUpperCase();

        if (/^[A-Z]$/.test(key)) {
          for (let i = 0; i < state.scrambledLetters.length; i += 1) {
            const btn = document.getElementById("letter-btn-" + i);

            if (
              state.scrambledLetters[i].letter === key &&
              btn &&
              btn.style.visibility !== "hidden"
            ) {
              selectLetter(i);
              break;
            }
          }
        }
      }

      if (state.mode === "binary") {
        if (e.key === "ArrowLeft" || e.key === "0") {
          animateBinaryButton("btn-zero");
          handleBinaryInput("0");
        }

        if (e.key === "ArrowRight" || e.key === "1") {
          animateBinaryButton("btn-one");
          handleBinaryInput("1");
        }
      }
    }

    function animateBinaryButton(id) {
      const btn = document.getElementById(id);

      if (!btn) return;

      btn.classList.add("scale-95", "bg-cyan-500/30");

      setTimeout(() => {
        btn.classList.remove("scale-95", "bg-cyan-500/30");
      }, 120);
    }

    function renderQuiz() {
      if (state.lives <= 0) return;

      if (state.currentIndex >= state.questions.length) {
        endGame(true, "Pemahaman kamu terhadap pipeline, tuning, dan evaluasi model sudah makin siap untuk ujian.");
        return;
      }

      const q = state.questions[state.currentIndex];
      const choices = shuffleArray([q[1], q[2], q[3], q[4]]);
      const correctIndex = choices.indexOf(q[1]);
      const explanation = escapeForAttribute(q[5]);

      container.innerHTML = `
        <section class="fade-in w-full max-w-3xl">
          <div class="mb-4 flex items-end justify-between gap-3">
            <div>
              <p class="text-xs font-black uppercase tracking-[0.24em] text-emerald-300">
                <i class="fa-solid fa-code-branch mr-2"></i>
                Model Logic
              </p>
              <h2 class="mt-1 text-xl font-black text-white">
                Debugging Konsep ML
              </h2>
            </div>

            <div class="mono rounded-2xl border border-slate-700 bg-slate-900/70 px-3 py-2 text-xs font-bold text-slate-300">
              Kasus ${state.currentIndex + 1}/${state.questions.length}
            </div>
          </div>

          <div class="mb-6 h-2 overflow-hidden rounded-full bg-slate-800">
            <div id="timer-bar-fill" class="timer-bar h-full rounded-full bg-emerald-400" style="width: 100%;"></div>
          </div>

          <div id="quiz-card" class="glass relative rounded-[1.75rem] p-5 md:p-7">
            <div id="time-text" class="mono absolute -right-3 -top-3 grid h-12 w-12 place-items-center rounded-2xl border border-slate-700 bg-slate-950 text-xs font-black text-white shadow-xl"></div>

            <div class="mb-5 inline-flex items-center gap-2 rounded-full bg-emerald-400/10 px-3 py-1.5 text-xs font-bold text-emerald-200">
              <i class="fa-solid fa-database"></i>
              Case-based question
            </div>

            <h3 class="text-lg font-bold leading-8 text-white md:text-xl">
              ${q[0]}
            </h3>

            <div class="mt-6 grid grid-cols-1 gap-3">
              ${choices.map((choice, index) => `
                <button
                  onclick="handleQuizAnswer(${index}, ${correctIndex}, '${explanation}')"
                  class="btn-game flex w-full items-center gap-3 rounded-2xl border border-slate-700 bg-slate-900/70 p-4 text-left text-slate-200 hover:border-emerald-400/70 hover:bg-emerald-400/10"
                >
                  <span class="mono grid h-9 w-9 shrink-0 place-items-center rounded-xl border border-slate-700 bg-slate-950 font-black text-emerald-300">
                    ${String.fromCharCode(65 + index)}
                  </span>
                  <span class="text-sm font-semibold leading-6 md:text-base">${choice}</span>
                </button>
              `).join("")}
            </div>
          </div>

          <div id="explanation-box" class="hidden mt-5 rounded-3xl border border-emerald-400/20 bg-emerald-400/10 p-5 text-sm leading-7 text-emerald-50"></div>
        </section>
      `;

      startTimer(40, () => handleQuizAnswer(-1, correctIndex, explanation));
    }

    function handleQuizAnswer(selectedIndex, correctIndex, explanation) {
      clearInterval(state.timer);

      const card = document.getElementById("quiz-card");
      const expBox = document.getElementById("explanation-box");
      const buttons = card.querySelectorAll("button");

      buttons.forEach((button) => {
        button.disabled = true;
      });

      if (selectedIndex === correctIndex) {
        playSuccess();
        state.score += 50;

        buttons[selectedIndex].className =
          "flex w-full items-center gap-3 rounded-2xl border border-emerald-300 bg-emerald-500/80 p-4 text-left text-white";
      } else {
        playError();
        state.lives -= 1;
        card.classList.add("shake");

        if (selectedIndex >= 0) {
          buttons[selectedIndex].className =
            "flex w-full items-center gap-3 rounded-2xl border border-rose-300 bg-rose-500/80 p-4 text-left text-white";
        }

        buttons[correctIndex].className =
          "flex w-full items-center gap-3 rounded-2xl border border-emerald-300 bg-emerald-500/50 p-4 text-left text-white";
      }

      expBox.classList.remove("hidden");
      expBox.innerHTML = `
        <p class="mb-1 font-black text-emerald-200">
          <i class="fa-solid fa-lightbulb mr-2"></i>
          Pembahasan
        </p>
        <p>${explanation}</p>
      `;

      updateStats();

      if (state.lives > 0) {
        setTimeout(() => {
          state.currentIndex += 1;
          renderQuiz();
        }, 5000);
      }
    }

    function renderKeywordQuiz() {
      if (state.lives <= 0) return;

      if (state.currentIndex >= state.questions.length) {
        endGame(true, "Istilah inti Machine Learning sudah lebih kuat di memori kamu.");
        return;
      }

      state.currentPuzzle = state.questions[state.currentIndex];
      state.userAnswerObj = [];

      const letters = state.currentPuzzle.word.split("");
      let scrambled = letters.map((letter, index) => ({ letter, id: index }));

      scrambled = shuffleArray(scrambled);

      while (
        scrambled.map((item) => item.letter).join("") === state.currentPuzzle.word &&
        scrambled.length > 1
      ) {
        scrambled = shuffleArray(scrambled);
      }

      state.scrambledLetters = scrambled;

      container.innerHTML = `
        <section class="fade-in w-full max-w-3xl">
          <div class="mb-4 flex items-end justify-between gap-3">
            <div>
              <p class="text-xs font-black uppercase tracking-[0.24em] text-violet-300">
                <i class="fa-solid fa-keyboard mr-2"></i>
                Concept Decode
              </p>
              <h2 class="mt-1 text-xl font-black text-white">
                Susun Istilah Kritis
              </h2>
            </div>

            <div class="mono rounded-2xl border border-slate-700 bg-slate-900/70 px-3 py-2 text-xs font-bold text-slate-300">
              Kata ${state.currentIndex + 1}/${state.questions.length}
            </div>
          </div>

          <div class="mb-6 h-2 overflow-hidden rounded-full bg-slate-800">
            <div id="timer-bar-fill" class="timer-bar h-full rounded-full bg-violet-400" style="width: 100%;"></div>
          </div>

          <div class="glass rounded-[1.75rem] p-5 text-center md:p-7">
            <div class="mx-auto mb-5 grid h-14 w-14 place-items-center rounded-2xl bg-violet-400/10 text-violet-300">
              <i class="fa-solid fa-cubes-stacked text-2xl"></i>
            </div>

            <p class="mx-auto max-w-2xl text-base font-semibold leading-8 text-slate-200 md:text-lg">
              “${state.currentPuzzle.hint}”
            </p>

            <div id="answer-slots" class="mt-8 flex min-h-[56px] flex-wrap justify-center gap-2">
              ${state.currentPuzzle.word.split("").map(() => `
                <div class="grid h-12 w-10 place-items-center rounded-2xl border-2 border-slate-700 bg-slate-950 text-xl font-black text-white shadow-inner md:h-14 md:w-12"></div>
              `).join("")}
            </div>

            <div id="scrambled-letters" class="mt-8 flex flex-wrap justify-center gap-2">
              ${state.scrambledLetters.map((item, index) => `
                <button
                  onclick="selectLetter(${index})"
                  id="letter-btn-${index}"
                  class="btn-game grid h-12 w-10 place-items-center rounded-2xl border border-slate-600 bg-slate-800 text-xl font-black text-white hover:border-violet-300 hover:bg-violet-500/60 md:h-14 md:w-12"
                >
                  ${item.letter}
                </button>
              `).join("")}
            </div>

            <p class="mono mt-6 text-xs text-slate-500">
              Ketik huruf di keyboard untuk input cepat. Backspace/Esc untuk reset.
            </p>

            <button
              onclick="resetWord()"
              class="mt-4 rounded-2xl border border-slate-700 bg-slate-900 px-4 py-2 text-sm font-bold text-slate-300 hover:bg-slate-800"
            >
              <i class="fa-solid fa-rotate-left mr-2"></i>
              Reset
            </button>
          </div>
        </section>
      `;

      startTimer(25, () => checkKeywordAnswer(true));
    }

    function selectLetter(index) {
      const btn = document.getElementById("letter-btn-" + index);

      if (!btn || btn.style.visibility === "hidden") return;

      playClick();

      btn.style.visibility = "hidden";

      state.userAnswerObj.push({
        letter: state.scrambledLetters[index].letter,
        id: index
      });

      updateAnswerSlots();
    }

    function resetWord() {
      playClick();

      state.userAnswerObj = [];

      state.scrambledLetters.forEach((_, index) => {
        const btn = document.getElementById("letter-btn-" + index);
        if (btn) btn.style.visibility = "visible";
      });

      updateAnswerSlots();
    }

    function updateAnswerSlots() {
      const slots = document.getElementById("answer-slots").children;
      let currentWord = "";

      for (let i = 0; i < state.currentPuzzle.word.length; i += 1) {
        if (i < state.userAnswerObj.length) {
          slots[i].innerText = state.userAnswerObj[i].letter;
          slots[i].className =
            "grid h-12 w-10 place-items-center rounded-2xl border-2 border-violet-300 bg-violet-500/50 text-xl font-black text-white shadow-inner md:h-14 md:w-12";
          currentWord += state.userAnswerObj[i].letter;
        } else {
          slots[i].innerText = "";
          slots[i].className =
            "grid h-12 w-10 place-items-center rounded-2xl border-2 border-slate-700 bg-slate-950 text-xl font-black text-white shadow-inner md:h-14 md:w-12";
        }
      }

      if (currentWord.length === state.currentPuzzle.word.length) {
        checkKeywordAnswer(false, currentWord);
      }
    }

    function checkKeywordAnswer(isTimeout, word = "") {
      clearInterval(state.timer);

      const isCorrect = word === state.currentPuzzle.word;
      const slots = document.getElementById("answer-slots").children;

      document.querySelectorAll("[id^='letter-btn-']").forEach((button) => {
        button.disabled = true;
      });

      if (isCorrect) {
        playSuccess();
        state.score += 100;

        for (const slot of slots) {
          slot.className =
            "grid h-12 w-10 place-items-center rounded-2xl border-2 border-emerald-300 bg-emerald-500/80 text-xl font-black text-white shadow-inner md:h-14 md:w-12";
        }
      } else {
        playError();
        state.lives -= 1;

        document.getElementById("answer-slots").parentElement.classList.add("shake");

        for (let i = 0; i < slots.length; i += 1) {
          slots[i].innerText = state.currentPuzzle.word[i];
          slots[i].className =
            "grid h-12 w-10 place-items-center rounded-2xl border-2 border-rose-300 bg-rose-500/80 text-xl font-black text-white shadow-inner md:h-14 md:w-12";
        }
      }

      updateStats();

      if (state.lives > 0) {
        setTimeout(() => {
          state.currentIndex += 1;
          renderKeywordQuiz();
        }, 2500);
      }
    }

    function startNextBinaryWord() {
      if (state.lives <= 0) return;

      if (state.currentIndex >= state.questions.length) {
        endGame(true, "Binary stream selesai. Kamu makin paham representasi token dan pola sinyal komputasi.");
        return;
      }

      state.currentBinaryWord = state.questions[state.currentIndex];
      state.currentBinaryCharIndex = 0;
      state.currentBinaryInput = "";

      renderBinaryBoard();
    }

    function renderBinaryBoard() {
      if (state.lives <= 0) return;

      container.innerHTML = `
        <section class="fade-in w-full max-w-xl">
          <div class="mb-4 flex items-end justify-between gap-3">
            <div>
              <p class="text-xs font-black uppercase tracking-[0.24em] text-cyan-300">
                <i class="fa-solid fa-microchip mr-2"></i>
                Binary Stream
              </p>
              <h2 class="mt-1 text-xl font-black text-white">
                Kirim Token sebagai Sinyal Biner
              </h2>
            </div>

            <div class="mono rounded-2xl border border-slate-700 bg-slate-900/70 px-3 py-2 text-xs font-bold text-slate-300">
              Token ${state.currentIndex + 1}/${state.questions.length}
            </div>
          </div>

          <div class="mb-6 h-2 overflow-hidden rounded-full bg-slate-800">
            <div id="timer-bar-fill" class="timer-bar h-full rounded-full bg-cyan-400" style="width: 100%;"></div>
          </div>

          <div class="glass rounded-[1.75rem] p-5 md:p-7">
            <p class="mono text-center text-[10px] font-black uppercase tracking-[0.28em] text-slate-500">
              Target Token
            </p>

            <div class="mt-3 flex justify-center gap-3 text-4xl font-black tracking-widest md:text-5xl">
              ${state.currentBinaryWord.split("").map((char, index) => `
                <span class="${
                  index === state.currentBinaryCharIndex
                    ? "scale-110 border-b-4 border-cyan-300 pb-1 text-cyan-300"
                    : index < state.currentBinaryCharIndex
                      ? "text-emerald-400/50"
                      : "text-slate-300"
                }">
                  ${char}
                </span>
              `).join("")}
            </div>

            <div class="mt-7 rounded-3xl border border-slate-800 bg-slate-950 p-5 shadow-inner">
              <p class="mono mb-2 text-[10px] font-bold uppercase tracking-widest text-slate-600">
                Input Buffer
              </p>

              <div
                id="binary-input-display"
                class="mono grid h-20 place-items-center text-5xl font-black tracking-[0.25em] text-white"
              ></div>
            </div>

            <div id="hint-box" class="mt-5 flex min-h-[36px] items-center justify-center text-center text-sm font-bold opacity-0 transition-all"></div>
          </div>

          <div class="mt-5 grid grid-cols-2 gap-4">
            <button
              id="btn-zero"
              onclick="handleBinaryInput('0')"
              class="btn-game rounded-[1.5rem] border border-cyan-400/20 bg-cyan-400/10 p-8 text-center text-white hover:border-cyan-300/70 hover:bg-cyan-400/20"
            >
              <span class="mono block text-6xl font-black">0</span>
              <span class="mono mt-2 block text-xs uppercase tracking-widest text-cyan-200/70">
                Arrow Left
              </span>
            </button>

            <button
              id="btn-one"
              onclick="handleBinaryInput('1')"
              class="btn-game rounded-[1.5rem] border border-violet-400/20 bg-violet-400/10 p-8 text-center text-white hover:border-violet-300/70 hover:bg-violet-400/20"
            >
              <span class="mono block text-6xl font-black">1</span>
              <span class="mono mt-2 block text-xs uppercase tracking-widest text-violet-200/70">
                Arrow Right
              </span>
            </button>
          </div>
        </section>
      `;

      startTimer(10, () => handleBinaryFail());
    }

    function handleBinaryInput(char) {
      if (state.lives <= 0) return;

      char === "0" ? playZero() : playOne();

      state.currentBinaryInput += char;

      const display = document.getElementById("binary-input-display");
      display.innerText = state.currentBinaryInput;

      const targetChar = state.currentBinaryWord[state.currentBinaryCharIndex];
      const targetBinary = binaryDictionary[targetChar].binary;

      if (targetBinary === state.currentBinaryInput) {
        clearInterval(state.timer);
        playSuccess();

        state.score += 50;

        updateStats();

        display.classList.replace("text-white", "text-cyan-300");

        setTimeout(() => {
          state.currentBinaryInput = "";
          state.currentBinaryCharIndex += 1;

          if (state.currentBinaryCharIndex >= state.currentBinaryWord.length) {
            state.currentIndex += 1;
            startNextBinaryWord();
          } else {
            renderBinaryBoard();
          }
        }, 400);

        return;
      }

      if (!targetBinary.startsWith(state.currentBinaryInput)) {
        handleBinaryFail();
      }
    }

    function handleBinaryFail() {
      clearInterval(state.timer);
      playError();

      state.lives -= 1;

      if (state.lives <= 0) {
        updateStats();
        return;
      }

      updateStats();

      const display = document.getElementById("binary-input-display");

      if (display) {
        display.classList.replace("text-white", "text-rose-400");
        display.parentElement.parentElement.classList.add("shake");
      }

      const hintBox = document.getElementById("hint-box");

      if (hintBox) {
        const expectedChar = state.currentBinaryWord[state.currentBinaryCharIndex];
        const expectedBinary = binaryDictionary[expectedChar].binary;

        hintBox.innerHTML = `
          <span class="rounded-xl border border-cyan-400/30 bg-cyan-400/10 px-3 py-1 text-cyan-200">
            ${expectedChar}
          </span>
          <i class="fa-solid fa-arrow-right mx-3 text-slate-600"></i>
          <span class="mono text-lg tracking-[0.25em] text-white">
            ${expectedBinary}
          </span>
        `;

        hintBox.classList.remove("opacity-0");
        hintBox.classList.add("opacity-100");
      }

      setTimeout(() => {
        if (state.lives > 0) {
          state.currentBinaryInput = "";
          renderBinaryBoard();
        }
      }, 3000);
    }

    function endGame(isWin, winMsg = "") {
      clearInterval(state.timer);
      document.removeEventListener("keydown", handleGlobalKeydown);
      statsHeader.classList.add("hidden");
      state.mode = "result";

      const statusTitle = isWin ? "Training Complete" : "Model Failed";
      const statusColor = isWin ? "text-emerald-300" : "text-rose-300";
      const icon = isWin ? "fa-circle-check" : "fa-triangle-exclamation";
      const message = isWin
        ? winMsg
        : "Simulasi berhenti. Review lagi konsep dasar pipeline, leakage, tuning, dan evaluasi model sebelum mencoba ulang.";

      container.innerHTML = `
        <section class="fade-in w-full max-w-xl">
          <div class="glass overflow-hidden rounded-[2rem] p-7 text-center md:p-8">
            <div class="mx-auto mb-6 grid h-20 w-20 place-items-center rounded-3xl ${
              isWin ? "bg-emerald-400/10 text-emerald-300" : "bg-rose-400/10 text-rose-300"
            }">
              <i class="fa-solid ${icon} text-4xl"></i>
            </div>

            <p class="mono mb-2 text-xs font-black uppercase tracking-[0.26em] text-slate-500">
              Evaluation Result
            </p>

            <h2 class="${statusColor} text-3xl font-black">
              ${statusTitle}
            </h2>

            <p class="mx-auto mt-4 max-w-md text-sm leading-7 text-slate-300">
              ${message}
            </p>

            <div class="mx-auto mt-7 max-w-xs rounded-3xl border border-slate-800 bg-slate-950/80 p-5 shadow-inner">
              <p class="mono text-[10px] font-black uppercase tracking-[0.28em] text-slate-500">
                Final Score
              </p>

              <p class="mono mt-2 text-6xl font-black text-white">
                ${state.score}
              </p>
            </div>

            <button
              onclick="renderMenu()"
              class="btn-game mt-7 w-full rounded-2xl bg-gradient-to-r from-cyan-500 to-violet-500 px-5 py-4 font-black text-white shadow-lg shadow-cyan-950/40"
            >
              <i class="fa-solid fa-rotate-right mr-2"></i>
              Kembali ke Menu Latihan
            </button>
          </div>
        </section>
      `;
    }

    renderMenu();
  </script>
</body>
</html>
