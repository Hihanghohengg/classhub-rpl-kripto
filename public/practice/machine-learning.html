<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Latihan Machine Learning - ClassHub</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />

  <style>
    :root {
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.82);
      --panel-solid: #0f172a;
      --line: rgba(148, 163, 184, 0.18);
      --cyan: #38bdf8;
      --violet: #a855f7;
      --emerald: #34d399;
      --amber: #fbbf24;
      --rose: #fb7185;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(168, 85, 247, 0.18), transparent 36%),
        radial-gradient(circle at bottom, rgba(16, 185, 129, 0.12), transparent 34%),
        var(--bg);
      color: #f8fafc;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
      touch-action: manipulation;
    }

    body { min-height: 100vh; }

    .mono { font-family: "JetBrains Mono", monospace; }

    .mesh-bg {
      position: fixed; inset: 0; z-index: -3;
      background-image:
        linear-gradient(rgba(56, 189, 248, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168, 85, 247, 0.045) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent 90%);
      pointer-events: none;
    }

    .neural-bg {
      position: fixed; inset: 0; z-index: -2; pointer-events: none; opacity: 0.55;
      background:
        radial-gradient(circle at 16% 18%, rgba(56, 189, 248, 0.34) 0 2px, transparent 3px),
        radial-gradient(circle at 30% 38%, rgba(168, 85, 247, 0.32) 0 2px, transparent 3px),
        radial-gradient(circle at 62% 24%, rgba(52, 211, 153, 0.34) 0 2px, transparent 3px);
    }

    .floating-orb {
      position: fixed; width: 420px; height: 420px; border-radius: 999px;
      filter: blur(70px); opacity: 0.18; z-index: -1;
      animation: float 10s ease-in-out infinite alternate; pointer-events: none;
    }
    .orb-a { left: -160px; top: 12%; background: #38bdf8; }
    .orb-b { right: -170px; bottom: 8%; background: #a855f7; animation-delay: -3s; }

    @keyframes float {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(34px, -28px, 0) scale(1.08); }
    }

    .glass {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(18px);
    }

    .btn-game { transition: all 0.16s ease; }
    .btn-game:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(15, 23, 42, 0.35); }
    .btn-game:active:not(:disabled) { transform: scale(0.97); }
    .btn-game:disabled { cursor: default; }

    .fade-in { animation: fadeIn 0.3s ease both; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .gradient-text {
      background: linear-gradient(90deg, #38bdf8, #a855f7, #34d399);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    /* Opsi Jawaban Styles */
    .opt-correct { border-color: #34d399 !important; background: rgba(52, 211, 153, 0.15) !important; color: white !important;}
    .opt-wrong { border-color: #fb7185 !important; background: rgba(251, 113, 133, 0.15) !important; color: white !important;}
    .opt-dim { opacity: 0.5; }
  </style>
</head>

<body class="flex min-h-screen flex-col">
  <div class="mesh-bg"></div>
  <div class="neural-bg"></div>
  <div class="floating-orb orb-a"></div>
  <div class="floating-orb orb-b"></div>

  <header class="sticky top-0 z-20 border-b border-slate-800/80 bg-slate-950/75 px-4 py-3 backdrop-blur-xl">
    <div class="mx-auto flex w-full max-w-6xl items-center justify-between gap-3">
      <div class="flex min-w-0 items-center gap-3">
        <div class="grid h-11 w-11 shrink-0 place-items-center rounded-2xl border border-cyan-400/25 bg-cyan-400/10 text-cyan-300 shadow-lg shadow-cyan-950/30">
          <i class="fa-solid fa-graduation-cap text-xl"></i>
        </div>
        <div class="min-w-0">
          <h1 class="truncate text-base font-black uppercase tracking-wide text-white md:text-lg">
            Machine Learning Lab
          </h1>
          <p class="mono mt-0.5 truncate text-[10px] font-semibold uppercase tracking-[0.18em] text-slate-400">
            Sesi 1: Persiapan Teori PG
          </p>
        </div>
      </div>

      <div id="stats-header" class="hidden items-center gap-2 text-sm">
        <div class="glass inline-flex items-center gap-2 rounded-2xl px-4 py-2">
          <i class="fa-solid fa-chart-line text-cyan-400"></i>
          <span class="mono font-bold text-slate-400">Skor:</span>
          <span id="score-display" class="mono font-black text-white text-lg">0</span>
        </div>
      </div>
    </div>
  </header>

  <main id="app-container" class="relative z-10 mx-auto flex w-full max-w-4xl flex-1 flex-col items-center justify-center overflow-y-auto p-4"></main>

  <script>
    // --- DATABASE SOAL (Diambil dari Laporan/Rubrik Yohanes Obed) ---
    const quizData = [
      {
        question: "Berdasarkan hasil Exploratory Data Analysis (EDA) Anda pada dataset Titanic, fitur manakah yang terbukti menjadi prediktor keselamatan (survival) terkuat?",
        options: [
          "Tarif tiket (Fare), karena penumpang kaya diprioritaskan.",
          "Gender (Sex), di mana perempuan memiliki peluang selamat jauh lebih tinggi dibanding laki-laki.",
          "Pelabuhan asal (Embarked), karena posisi dek dipengaruhi pelabuhan.",
          "Jumlah orang tua/anak (Parch), karena keluarga besar lebih mudah selamat."
        ],
        correctIndex: 1,
        explanation: "<strong>JAWABAN B BENAR.</strong> Dalam kesimpulan laporan Lab Titanic Anda (Poin V.1), terbukti bahwa Gender adalah prediktor terkuat dimana perempuan jauh lebih diprioritaskan. <br><br><strong>Mengapa yang lain salah?</strong> Tarif tiket (Fare) dan Kelas memang berpengaruh (poin V.2 & V.5), tapi secara statistik Gender memegang peran korelasi paling dominan dalam protokol evakuasi (women and children first). Keluarga yang terlalu besar (Parch tinggi) justru terbukti lebih sulit selamat (Poin V.4)."
      },
      {
        question: "Menurut rubrik evaluasi dosen, apa 'Red Flag' (kesalahan fatal) yang menyebabkan terjadinya Data Leakage saat melakukan Hyperparameter Tuning?",
        options: [
          "Menentukan metrik scoring='roc_auc' pada dataset klasifikasi.",
          "Menggunakan StandardScaler pada seluruh data latih (X_train) secara langsung sebelum Cross-Validation (CV) dipecah.",
          "Membagi data menggunakan StratifiedKFold pada kasus klasifikasi yang tidak seimbang.",
          "Memakai GridSearchCV karena menguji seluruh kombinasi."
        ],
        correctIndex: 1,
        explanation: "<strong>JAWABAN B BENAR.</strong> Ini adalah jebakan klasik. Jika Anda melakukan <code>fit_transform</code> pada seluruh X_train, scaler akan menghitung mean/std dari seluruh data latih. Saat Cross-Validation berjalan, sebagian data latih itu dijadikan 'data validasi'. Artinya, informasi dari data validasi telah 'bocor' ke scaler sebelum diprediksi. <br><br><strong>Solusi:</strong> Proses scaling WAJIB dibungkus menggunakan <code>scikit-learn Pipeline</code> agar transformasi hanya dilakukan per-lipatan (fold) CV."
      },
      {
        question: "Pada praktikum Neural Network (Pertemuan 5), Anda menggunakan parameter <code>class_weight</code> (Class 0: 0.56, Class 1: 4.43). Apa tujuan matematis dari langkah tersebut?",
        options: [
          "Mencegah Vanishing Gradient pada layer awal Deep Learning.",
          "Mengurangi kecepatan proses komputasi per epoch.",
          "Memberikan penalti/bobot error yang lebih besar pada kelas minoritas agar model tidak bias sekadar menebak kelas mayoritas.",
          "Mengecilkan nilai fitur numerik seperti StandardScaler."
        ],
        correctIndex: 2,
        explanation: "<strong>JAWABAN C BENAR.</strong> Pada data medis yang Anda kerjakan, jumlah pasien sakit (Yes) sangat sedikit dibanding yang sehat (No). Jika dibiarkan, Neural Network akan mengambil jalan pintas: selalu memprediksi 'No' demi akurasi 90%. Parameter <code>class_weight</code> memaksa algoritma untuk 'membayar mahal' (loss tinggi) jika salah memprediksi kelas minoritas, sehingga model menjadi seimbang."
      },
      {
        question: "Dalam Lab 03 (Breast Cancer), Anda menggunakan metrik F1-Score (<code>scoring='f1'</code>) pada <code>cross_val_score</code>. Mengapa F1-Score sering lebih direkomendasikan daripada Akurasi pada kasus medis?",
        options: [
          "Karena F1-Score menyeimbangkan Precision dan Recall, sehingga performa pada kelas minoritas (yang krusial di medis) dapat terukur dengan benar.",
          "Karena F1-Score otomatis mencegah terjadinya data leakage saat preprocessing.",
          "Karena Akurasi tidak bisa digunakan untuk klasifikasi biner.",
          "Karena F1-Score menghitung luas area di bawah kurva (ROC)."
        ],
        correctIndex: 0,
        explanation: "<strong>JAWABAN A BENAR.</strong> F1-Score adalah rata-rata harmonik dari Precision dan Recall. Dalam konteks medis (seperti kanker), kita tidak ingin model yang akurasinya tinggi tapi gagal mendeteksi pasien yang benar-benar sakit (False Negatives tinggi). <br><br><strong>Mengapa yang lain salah?</strong> Luas area di bawah kurva adalah definisi dari AUC-ROC (jawaban D). Akurasi (jawaban C) bisa digunakan untuk klasifikasi biner, namun sangat menyesatkan jika datasetnya tidak seimbang (imbalanced)."
      },
      {
        question: "Berdasarkan materi TM-9, arsitektur Long Short-Term Memory (LSTM) diciptakan utamanya untuk menyelesaikan masalah apa pada Vanilla RNN?",
        options: [
          "Overfitting saat dataset terlalu kecil.",
          "Data tabular yang memiliki banyak missing values.",
          "Vanishing Gradient, yang membuat RNN biasa 'lupa' akan informasi awal pada sekuens data yang panjang.",
          "Ketidakmampuan RNN memproses data dalam bentuk matriks gambar (pixels)."
        ],
        correctIndex: 2,
        explanation: "<strong>JAWABAN C BENAR.</strong> Vanilla RNN kesulitan menangani dependensi jangka panjang karena gradien menyusut drastis (Vanishing Gradient) saat proses backpropagation melintasi banyak <i>time steps</i>. LSTM menyelesaikannya menggunakan struktur <i>Gates</i> (Forget, Input, Output) yang mengatur memori mana yang harus disimpan atau dibuang."
      },
      {
        question: "Dalam kode Anda, fungsi <code>train_test_split</code> dipanggil menggunakan parameter <code>stratify=y</code>. Apa akibatnya jika parameter ini TIDAK digunakan pada kasus klasifikasi klasifikasi berisiko tinggi?",
        options: [
          "Data numerik akan berubah menjadi string.",
          "Proporsi jumlah kelas target di data Train dan data Test bisa berbeda jauh dari populasi asli, merusak objektivitas evaluasi model.",
          "Model akan gagal melakukan import library scikit-learn.",
          "Hyperparameter tuning akan berjalan tanpa henti (infinite loop)."
        ],
        correctIndex: 1,
        explanation: "<strong>JAWABAN B BENAR.</strong> <code>stratify=y</code> memastikan bahwa jika data asli memiliki rasio 80% Sehat dan 20% Sakit, maka himpunan X_train dan X_test juga akan memiliki rasio persis 80:20. Tanpa ini, pembagian acak bisa saja membuat data X_test isinya 100% data Sehat, membuat evaluasi menjadi tidak valid."
      }
    ];

    // --- AUDIO SYSTEM ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }
    function playTone(duration, frequency, type) {
      initAudio();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.type = type;
      oscillator.frequency.value = frequency;
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.start();
      gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration / 1000);
      oscillator.stop(audioCtx.currentTime + duration / 1000);
    }
    function playSuccess() { playTone(300, 850, "triangle"); }
    function playError() { playTone(250, 150, "sawtooth"); }

    // --- GAME STATE ---
    let state = {
      score: 0,
      currentIndex: 0,
      shuffledData: []
    };

    const container = document.getElementById("app-container");
    const statsHeader = document.getElementById("stats-header");
    const scoreDisplay = document.getElementById("score-display");

    // Acak Urutan Array
    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function initGame() {
      // Siapkan data soal (acak urutan soal, dan acak urutan opsinya)
      state.score = 0;
      state.currentIndex = 0;
      scoreDisplay.innerText = "0";
      
      let tempQuestions = shuffleArray(quizData);
      state.shuffledData = tempQuestions.map(q => {
        let opts = q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.correctIndex }));
        opts = shuffleArray(opts);
        return {
          question: q.question,
          options: opts,
          explanation: q.explanation
        };
      });

      statsHeader.classList.remove("hidden");
      renderQuestion();
    }

    function renderMenu() {
      statsHeader.classList.add("hidden");
      container.innerHTML = `
        <section class="fade-in w-full max-w-2xl text-center">
          <div class="glass relative overflow-hidden rounded-[2rem] p-8 md:p-12">
            <div class="mx-auto mb-6 grid h-20 w-20 place-items-center rounded-3xl bg-cyan-400/10 text-cyan-300 border border-cyan-400/20">
              <i class="fa-solid fa-microscope text-4xl"></i>
            </div>
            
            <h2 class="text-3xl font-black tracking-tight text-white md:text-5xl mb-4">
              Ujian Teori <span class="gradient-text">Machine Learning</span>
            </h2>
            
            <p class="mx-auto max-w-xl text-sm md:text-base leading-7 text-slate-300 mb-8">
              Kuis ini dirancang khusus dari kasus nyata di Laporan Praktikum Anda (Titanic, Breast Cancer, dan Parameter Tuning). <br><br><b>Tidak ada nyawa dan tidak ada timer.</b> Fokus pada pemahaman penjelasan dari setiap sintaks dan teori.
            </p>

            <button onclick="initGame()" class="btn-game inline-flex items-center gap-3 rounded-2xl bg-cyan-600 hover:bg-cyan-500 px-8 py-4 font-black text-white shadow-lg shadow-cyan-900/40 text-lg">
              <i class="fa-solid fa-play"></i> Mulai Kuis Teori
            </button>
          </div>
        </section>
      `;
    }

    function renderQuestion() {
      if (state.currentIndex >= state.shuffledData.length) {
        endGame();
        return;
      }

      const q = state.shuffledData[state.currentIndex];

      container.innerHTML = `
        <section class="fade-in w-full max-w-3xl">
          <div class="mb-4 flex items-end justify-between">
            <p class="text-xs font-black uppercase tracking-[0.24em] text-cyan-300">
              <i class="fa-solid fa-book-open mr-2"></i> Kasus Analisis
            </p>
            <div class="mono rounded-full border border-slate-700 bg-slate-900/70 px-4 py-1 text-xs font-bold text-slate-300">
              Soal ${state.currentIndex + 1} dari ${state.shuffledData.length}
            </div>
          </div>

          <div class="glass rounded-[1.75rem] p-6 md:p-8 mb-6 relative">
            <h3 class="text-lg md:text-xl font-semibold leading-relaxed text-white mb-6">
              ${q.question}
            </h3>

            <div class="grid gap-3" id="options-container">
              ${q.options.map((opt, i) => `
                <button id="opt-${i}" onclick="handleAnswer(${i})" class="btn-game w-full flex items-start gap-4 rounded-2xl border border-slate-700 bg-slate-900/50 p-4 text-left text-slate-300 hover:bg-slate-800 transition-colors">
                  <span class="mono grid h-8 w-8 shrink-0 place-items-center rounded-lg border border-slate-700 bg-slate-950 font-black text-cyan-400">
                    ${String.fromCharCode(65 + i)}
                  </span>
                  <span class="text-sm leading-6 md:text-base mt-0.5">${opt.text}</span>
                </button>
              `).join("")}
            </div>
          </div>

          <div id="explanation-box" class="hidden fade-in glass rounded-[1.5rem] p-6 mb-6 border-l-4 border-l-cyan-400 bg-cyan-950/20">
            <p class="text-sm md:text-base leading-7 text-slate-200">
              ${q.explanation}
            </p>
          </div>

          <div class="flex justify-end">
            <button id="next-btn" onclick="nextQuestion()" class="hidden fade-in btn-game rounded-xl bg-white text-slate-900 px-8 py-3 font-bold shadow-lg hover:bg-slate-200">
              Lanjut ke Soal Berikutnya <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>
          </div>
        </section>
      `;
    }

    function handleAnswer(selectedIndex) {
      const q = state.shuffledData[state.currentIndex];
      const isCorrect = q.options[selectedIndex].isCorrect;

      // Lock buttons
      const containerDiv = document.getElementById("options-container");
      const buttons = containerDiv.querySelectorAll("button");
      buttons.forEach(btn => btn.disabled = true);

      if (isCorrect) {
        playSuccess();
        state.score += 20;
        scoreDisplay.innerText = state.score;
      } else {
        playError();
      }

      // Coloring the options
      q.options.forEach((opt, idx) => {
        const btn = document.getElementById(`opt-${idx}`);
        if (opt.isCorrect) {
          btn.classList.add("opt-correct");
        } else if (idx === selectedIndex && !isCorrect) {
          btn.classList.add("opt-wrong");
        } else {
          btn.classList.add("opt-dim");
        }
      });

      // Show explanation & next button
      document.getElementById("explanation-box").classList.remove("hidden");
      document.getElementById("next-btn").classList.remove("hidden");
    }

    function nextQuestion() {
      state.currentIndex++;
      renderQuestion();
    }

    function endGame() {
      statsHeader.classList.add("hidden");
      container.innerHTML = `
        <section class="fade-in w-full max-w-xl">
          <div class="glass overflow-hidden rounded-[2rem] p-8 text-center">
            <div class="mx-auto mb-6 grid h-24 w-24 place-items-center rounded-full bg-emerald-400/10 text-emerald-400 border border-emerald-400/30">
              <i class="fa-solid fa-flag-checkered text-5xl"></i>
            </div>

            <h2 class="text-3xl font-black text-white mb-2">Simulasi Teori Selesai!</h2>
            <p class="text-sm leading-7 text-slate-300 mb-8">
              Semua jebakan konseptual dari materi Deep Learning, EDA, dan Hyperparameter Tuning telah dibongkar.
            </p>

            <div class="mx-auto max-w-xs rounded-3xl border border-slate-800 bg-slate-950/80 p-5 shadow-inner mb-8">
              <p class="mono text-[10px] font-black uppercase tracking-[0.28em] text-slate-500 mb-2">Skor Kuis</p>
              <p class="mono text-6xl font-black text-cyan-400">${state.score}</p>
            </div>

            <button onclick="renderMenu()" class="btn-game w-full rounded-2xl bg-slate-800 hover:bg-slate-700 border border-slate-600 px-5 py-4 font-black text-white shadow-lg">
              <i class="fa-solid fa-rotate-left mr-2"></i> Ulangi Pemanasan Teori
            </button>
          </div>
        </section>
      `;
    }

    // Start App
    renderMenu();
  </script>
</body>
</html>
